<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js + Cannon-es 物理停车场模拟器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; }
        canvas { display: block; }
        #hud {
            position: absolute; top: 16px; left: 16px;
            color: #fff; font-family: 'Consolas', monospace;
            font-size: 14px; line-height: 1.6;
            background: rgba(0,0,0,0.6); padding: 10px 14px;
            border-radius: 6px; pointer-events: none;
        }
        #speed {
            position: absolute; bottom: 16px; right: 16px;
            color: #0f0; font-family: 'Consolas', monospace;
            font-size: 20px; pointer-events: none;
            background: rgba(0,0,0,0.6); padding: 8px 16px;
            border-radius: 6px;
        }
        #physics-info {
            position: absolute; bottom: 60px; left: 16px;
            color: #ff0; font-family: 'Consolas', monospace;
            font-size: 12px; pointer-events: none;
            background: rgba(0,0,0,0.6); padding: 6px 10px;
            border-radius: 6px;
        }

        /* ==========================================
           方向盘 UI 容器
           ========================================== */
        #steering-wrapper {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 180px;
            height: 220px;
            pointer-events: none;           /* 容器本身不拦截事件 */
            user-select: none;
        }

        /* 方向盘标题 */
        #steering-label {
            text-align: center;
            color: #aaa;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            margin-bottom: 4px;
            pointer-events: none;
        }

        /* 方向盘画布 — 接收鼠标事件 */
        #steering-canvas {
            display: block;
            margin: 0 auto;
            cursor: grab;
            pointer-events: auto;           /* 仅画布拦截 */
            border-radius: 50%;
        }
        #steering-canvas:active {
            cursor: grabbing;
        }

        /* 角度数值显示 */
        #steering-angle {
            text-align: center;
            color: #0ff;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            margin-top: 4px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="hud">
    &#x1F697; 物理停车场模拟器 (Cannon-es)<br>
    W - 加速 &nbsp; S - 刹车/倒车<br>
    空格 - 手刹 &nbsp; PageUp/Down - 视距<br>
    <span style="color:#0ff">鼠标拖拽方向盘或键盘 A/D 转向</span>
</div>

<div id="speed">0 km/h</div>
<div id="physics-info">加载中...</div>

<!-- 方向盘 UI -->
<div id="steering-wrapper">
    <div id="steering-label">STEERING</div>
    <canvas id="steering-canvas" width="180" height="180"></canvas>
    <div id="steering-angle">0.0 deg</div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/",
        "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';

// =============================================
// 一、Three.js 场景、相机、渲染器
// =============================================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 80, 200);

const camera = new THREE.PerspectiveCamera(
    60, window.innerWidth / window.innerHeight, 0.1, 1000
);
camera.position.set(0, 8, 15);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// =============================================
// 二、灯光系统
// =============================================

const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(20, 30, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 100;
dirLight.shadow.camera.left = -40;
dirLight.shadow.camera.right = 40;
dirLight.shadow.camera.top = 40;
dirLight.shadow.camera.bottom = -40;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x362A28, 0.4);
scene.add(hemiLight);

// =============================================
// 三、Cannon-es 物理世界初始化
// =============================================

const world = new CANNON.World({
    gravity: new CANNON.Vec3(0, -9.82, 0),
    allowSleep: true,
});

const defaultContactMaterial = new CANNON.ContactMaterial(
    new CANNON.Material('default'),
    new CANNON.Material('default'),
    { friction: 0.3, restitution: 0.2, contactEquationStiffness: 1e8, contactEquationRelaxation: 3 }
);
world.defaultContactMaterial = defaultContactMaterial;

const groundMaterial = new CANNON.Material('ground');
const wheelMaterial = new CANNON.Material('wheel');

const wheelGroundContact = new CANNON.ContactMaterial(
    wheelMaterial, groundMaterial,
    { friction: 0.45, restitution: 0.0, contactEquationStiffness: 1e8, contactEquationRelaxation: 3 }
);
world.addContactMaterial(wheelGroundContact);

// =============================================
// 四、物理地面刚体
// =============================================

const groundBody = new CANNON.Body({
    mass: 0,
    shape: new CANNON.Plane(),
    material: groundMaterial,
});
groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
world.addBody(groundBody);

// Three.js 地面
const groundGeo = new THREE.PlaneGeometry(200, 200);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.9, metalness: 0.0 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

const gridHelper = new THREE.GridHelper(200, 100, 0x888888, 0x666666);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// =============================================
// 五、停车场元素
// =============================================

function createParkingLines() {
    const group = new THREE.Group();
    const lineMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
    for (let row = 0; row < 2; row++) {
        const zBase = row === 0 ? -8 : 8;
        const dir = row === 0 ? -1 : 1;
        for (let i = 0; i < 10; i++) {
            const x = -20 + i * 4;
            const left = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.02, 3.5), lineMat);
            left.position.set(x, 0.02, zBase + dir * 1.5);
            group.add(left);
            const right = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.02, 3.5), lineMat);
            right.position.set(x + 3.5, 0.02, zBase + dir * 1.5);
            group.add(right);
            const bottom = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.02, 0.15), lineMat);
            bottom.position.set(x + 1.75, 0.02, zBase);
            group.add(bottom);
        }
    }
    scene.add(group);
}
createParkingLines();

function createBollards() {
    const mat = new THREE.MeshStandardMaterial({ color: 0xCC0000, roughness: 0.6 });
    [[-25,-15],[-25,-11],[-25,11],[-25,15],[25,-15],[25,-11],[25,11],[25,15]].forEach(([x, z]) => {
        const mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.25, 1.2, 8), mat);
        mesh.position.set(x, 0.6, z); mesh.castShadow = true; mesh.receiveShadow = true;
        scene.add(mesh);
        const body = new CANNON.Body({ mass: 0, shape: new CANNON.Cylinder(0.2, 0.25, 1.2, 8), position: new CANNON.Vec3(x, 0.6, z) });
        world.addBody(body);
    });
}
createBollards();

function createBuildings() {
    const configs = [
        { x: -35, z: 0, w: 15, h: 12, d: 15, color: 0x8899AA },
        { x: 35, z: 0, w: 12, h: 8, d: 20, color: 0x998877 },
        { x: 0, z: -30, w: 60, h: 10, d: 8, color: 0x778899 },
        { x: 0, z: 30, w: 60, h: 14, d: 8, color: 0x889988 },
    ];
    configs.forEach(({ x, z, w, h, d, color }) => {
        const mesh = new THREE.Mesh(
            new THREE.BoxGeometry(w, h, d),
            new THREE.MeshStandardMaterial({ color, roughness: 0.8, metalness: 0.1 })
        );
        mesh.position.set(x, h / 2, z); mesh.castShadow = true; mesh.receiveShadow = true;
        scene.add(mesh);
        const body = new CANNON.Body({ mass: 0, shape: new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)), position: new CANNON.Vec3(x, h/2, z) });
        world.addBody(body);
    });
}
createBuildings();

// =============================================
// 六、Cannon-es RaycastVehicle 车辆
// =============================================

const VEHICLE_CFG = {
    wheelRadius: 0.3,
    suspensionStiffness: 30,
    suspensionRestLength: 0.2,
    dampingRelaxation: 2.3,
    dampingCompression: 4.4,
    maxSuspensionForce: 100000,
    maxSuspensionTravel: 0.2,
    rollInfluence: 0.01,
    maxSteerAngle: 0.6,
    engineForce: 600,
    brakeForce: 50,
};

const chassisShape = new CANNON.Box(new CANNON.Vec3(1, 0.35, 2));
const chassisBody = new CANNON.Body({
    mass: 150,
    shape: chassisShape,
    position: new CANNON.Vec3(0, VEHICLE_CFG.wheelRadius + VEHICLE_CFG.suspensionRestLength + 0.35, 0),
});
world.addBody(chassisBody);

const vehicle = new CANNON.RaycastVehicle({
    chassisBody,
    indexRightAxis: 0,
    indexUpAxis: 1,
    indexForwardAxis: 2,
});

const wheelOptions = {
    radius: VEHICLE_CFG.wheelRadius,
    directionLocal: new CANNON.Vec3(0, -1, 0),
    suspensionStiffness: VEHICLE_CFG.suspensionStiffness,
    suspensionRestLength: VEHICLE_CFG.suspensionRestLength,
    maxSuspensionTravel: VEHICLE_CFG.maxSuspensionTravel,
    dampingRelaxation: VEHICLE_CFG.dampingRelaxation,
    dampingCompression: VEHICLE_CFG.dampingCompression,
    maxSuspensionForce: VEHICLE_CFG.maxSuspensionForce,
    rollInfluence: VEHICLE_CFG.rollInfluence,
    axleLocal: new CANNON.Vec3(-1, 0, 0),
    chassisConnectionPointLocal: new CANNON.Vec3(0, 0, 0),
    customSlidingRotationalSpeed: -30,
    useCustomSlidingRotationalSpeed: true,
};

const wheelPositions = [
    new CANNON.Vec3(-1.0, 0, 1.4),
    new CANNON.Vec3(1.0, 0, 1.4),
    new CANNON.Vec3(-1.0, 0, -1.4),
    new CANNON.Vec3(1.0, 0, -1.4),
];

const steerIndex = [0, 1];
const driveIndex = [2, 3];

wheelPositions.forEach((pos) => {
    const options = { ...wheelOptions, chassisConnectionPointLocal: pos };
    vehicle.addWheel(options);
});
vehicle.addToWorld(world);

// =============================================
// 七、Three.js 汽车视觉模型
// =============================================

const carGroup = new THREE.Group();

const bodyGeo = new THREE.BoxGeometry(2, 0.7, 4);
const bodyMat = new THREE.MeshStandardMaterial({ color: 0x1a5276, roughness: 0.3, metalness: 0.6 });
const chassisMesh = new THREE.Mesh(bodyGeo, bodyMat);
chassisMesh.castShadow = true;
carGroup.add(chassisMesh);

const cabinGeo = new THREE.BoxGeometry(1.8, 0.6, 2.2);
const cabinMat = new THREE.MeshStandardMaterial({ color: 0x2980b9, roughness: 0.2, metalness: 0.7 });
const cabinMesh = new THREE.Mesh(cabinGeo, cabinMat);
cabinMesh.position.set(0, 0.65, -0.3);
cabinMesh.castShadow = true;
carGroup.add(cabinMesh);

const glassMat = new THREE.MeshStandardMaterial({
    color: 0xaaddff, transparent: true, opacity: 0.5, roughness: 0.1, metalness: 0.8
});
const windshieldGeo = new THREE.BoxGeometry(1.6, 0.5, 0.05);
const frontGlass = new THREE.Mesh(windshieldGeo, glassMat);
frontGlass.position.set(0, 0.7, 0.75); frontGlass.rotation.x = 0.3;
carGroup.add(frontGlass);
const rearGlass = new THREE.Mesh(windshieldGeo, glassMat);
rearGlass.position.set(0, 0.7, -1.4); rearGlass.rotation.x = -0.3;
carGroup.add(rearGlass);

const headlightMat = new THREE.MeshStandardMaterial({ color: 0xffffaa, emissive: 0xffff00, emissiveIntensity: 0.5 });
const taillightMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.3 });
[-0.7, 0.7].forEach(x => {
    carGroup.add(Object.assign(new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), headlightMat), { position: new THREE.Vector3(x, 0.1, 2.01) }));
    carGroup.add(Object.assign(new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), taillightMat), { position: new THREE.Vector3(x, 0.1, -2.01) }));
});

scene.add(carGroup);

// 四个车轮视觉模型
const wheelMeshes = [];
const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8, metalness: 0.3 });
const hubMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.3, metalness: 0.8 });

for (let i = 0; i < 4; i++) {
    const wg = new THREE.Group();
    const tire = new THREE.Mesh(new THREE.CylinderGeometry(VEHICLE_CFG.wheelRadius, VEHICLE_CFG.wheelRadius, 0.25, 16), wheelMat);
    tire.rotation.z = Math.PI / 2; tire.castShadow = true; wg.add(tire);
    const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.26, 6), hubMat);
    hub.rotation.z = Math.PI / 2; wg.add(hub);
    scene.add(wg);
    wheelMeshes.push(wg);
}

// =============================================
// 八、键盘输入管理
// =============================================

const keys = new Set();
let isBraking = false;

window.addEventListener('keydown', (e) => {
    keys.add(e.key.toLowerCase());
    if (e.key === ' ') isBraking = true;
});
window.addEventListener('keyup', (e) => {
    keys.delete(e.key.toLowerCase());
    if (e.key === ' ') isBraking = false;
});

// =============================================
// 九、可拖拽方向盘 UI（Canvas 2D）
// =============================================

/**
 * SteeringWheel 类
 * - 在 Canvas 上绘制方向盘
 * - 支持鼠标拖拽旋转（最大 ±270°）
 * - 释放后自动回弹到中位
 * - 输出 angle（度）和归一化值 [-1, 1]
 */
class SteeringWheel {
    constructor(canvasId, angleDisplayId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        this.angleDisplay = document.getElementById(angleDisplayId);

        this.size = this.canvas.width;              // 画布尺寸（正方形）
        this.cx = this.size / 2;                     // 圆心 X
        this.cy = this.size / 2;                     // 圆心 Y
        this.outerR = this.size / 2 - 8;             // 方向盘外圈半径
        this.innerR = this.outerR * 0.55;            // 内圈辐条区域半径
        this.gripWidth = 14;                         // 握圈宽度

        // ---- 旋转状态 ----
        this.currentAngle = 0;                       // 当前旋转角度（度），范围 [-270, 270]
        this.maxAngle = 270;                         // 最大旋转角度
        this.isDragging = false;                     // 是否正在拖拽
        this.dragStartAngle = 0;                     // 拖拽起始角度（相对于圆心）
        this.dragStartRotation = 0;                  // 拖拽起始时方向盘旋转角度

        // ---- 回弹弹簧 ----
        this.springEnabled = false;                  // 释放后启用回弹
        this.springVelocity = 0;                     // 回弹速度

        this._bindEvents();
    }

    /** 绑定鼠标 / 触摸事件 */
    _bindEvents() {
        const c = this.canvas;

        c.addEventListener('mousedown', (e) => this._onPointerDown(e));
        window.addEventListener('mousemove', (e) => this._onPointerMove(e));
        window.addEventListener('mouseup',   (e) => this._onPointerUp(e));

        c.addEventListener('touchstart', (e) => { e.preventDefault(); this._onPointerDown(e.touches[0]); }, { passive: false });
        window.addEventListener('touchmove', (e) => { if (this.isDragging) this._onPointerMove(e.touches[0]); }, { passive: false });
        window.addEventListener('touchend',  (e) => this._onPointerUp(e));
    }

    /** 计算指针相对于圆心的角度（度） */
    _getPointerAngle(e) {
        const rect = this.canvas.getBoundingClientRect();
        const px = e.clientX - rect.left - this.cx;
        const py = e.clientY - rect.top - this.cy;
        return Math.atan2(py, px) * (180 / Math.PI);   // 范围 (-180, 180]
    }

    _onPointerDown(e) {
        // 检测点击位置是否在方向盘区域内
        const rect = this.canvas.getBoundingClientRect();
        const px = e.clientX - rect.left - this.cx;
        const py = e.clientY - rect.top - this.cy;
        const dist = Math.sqrt(px * px + py * py);
        if (dist > this.outerR + 20) return;           // 点击太远则忽略

        this.isDragging = true;
        this.springEnabled = false;
        this.springVelocity = 0;
        this.dragStartAngle = this._getPointerAngle(e);
        this.dragStartRotation = this.currentAngle;
    }

    _onPointerMove(e) {
        if (!this.isDragging) return;

        const pointerAngle = this._getPointerAngle(e);
        // 计算拖拽角度差（处理跨越 ±180° 的跳变）
        let delta = pointerAngle - this.dragStartAngle;
        if (delta > 180)  delta -= 360;
        if (delta < -180) delta += 360;

        // 限制在 ±maxAngle 范围
        this.currentAngle = THREE.MathUtils.clamp(
            this.dragStartRotation + delta,
            -this.maxAngle,
            this.maxAngle
        );
    }

    _onPointerUp() {
        if (!this.isDragging) return;
        this.isDragging = false;
        this.springEnabled = true;                     // 启用回弹
    }

    /** 每帧更新（回弹动画） */
    update(dt) {
        if (this.springEnabled && !this.isDragging) {
            // 弹簧阻尼回弹：力 = -stiffness * angle - damping * velocity
            const stiffness = 12;                      // 弹簧刚度
            const damping = 6;                         // 阻尼系数
            const force = -stiffness * this.currentAngle - damping * this.springVelocity;
            this.springVelocity += force * dt;
            this.currentAngle += this.springVelocity * dt;

            // 接近中位时归零
            if (Math.abs(this.currentAngle) < 0.3 && Math.abs(this.springVelocity) < 1) {
                this.currentAngle = 0;
                this.springVelocity = 0;
                this.springEnabled = false;
            }
        }

        // 更新角度显示
        if (this.angleDisplay) {
            this.angleDisplay.textContent = `${this.currentAngle.toFixed(1)} deg`;
        }
    }

    /** 获取归一化转向值 [-1, 1]，用于映射到物理转向角 */
    getSteerNormalized() {
        return this.currentAngle / this.maxAngle;      // -1 = 左满舵, +1 = 右满舵
    }

    /** 绘制方向盘（每帧调用） */
    draw() {
        const ctx = this.ctx;
        const cx = this.cx;
        const cy = this.cy;
        const R = this.outerR;

        ctx.clearRect(0, 0, this.size, this.size);

        // ---- 背景刻度弧（左右各 270° 的弧形轨道）----
        ctx.save();
        ctx.translate(cx, cy);

        // 背景弧线：从 -270° 到 +270°（起始角 = -90° - 270° = -360°，结束角 = -90° + 270° = 180°）
        // 实际画弧范围：120° 到 420°（即 -240° 到 60°，换算后）
        // 简化：从 210° (底部左侧) 顺时针到 330° (底部右侧) = 从 +210° 到 +150°（跨底部）
        const arcStart = Math.PI * 0.75;   // 135°
        const arcEnd   = Math.PI * 2.25;   // 405° = 45°

        // 背景弧（深灰）
        ctx.beginPath();
        ctx.arc(0, 0, R + 3, arcStart, arcEnd);
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 6;
        ctx.stroke();

        // 当前旋转位置指示弧（青色）
        const normalized = this.currentAngle / this.maxAngle;  // -1 ~ +1
        const indicatorEnd = arcStart + normalized * (arcEnd - arcStart) / 2 + (arcEnd - arcStart) / 2;
        const arcMid = (arcStart + arcEnd) / 2;
        if (Math.abs(this.currentAngle) > 0.5) {
            ctx.beginPath();
            ctx.arc(0, 0, R + 3,
                normalized < 0 ? indicatorEnd : arcMid,
                normalized < 0 ? arcMid : indicatorEnd
            );
            ctx.strokeStyle = normalized < 0 ? '#ff6644' : '#44ff66';  // 左红右绿
            ctx.lineWidth = 6;
            ctx.stroke();
        }

        // 刻度线（每 30° 一条）
        for (let deg = -this.maxAngle; deg <= this.maxAngle; deg += 30) {
            const rad = (deg - 90) * Math.PI / 180;       // 0° 在顶部
            const isMajor = deg % 90 === 0;
            const len = isMajor ? 10 : 5;
            ctx.beginPath();
            ctx.moveTo(Math.cos(rad) * (R - len), Math.sin(rad) * (R - len));
            ctx.lineTo(Math.cos(rad) * R, Math.sin(rad) * R);
            ctx.strokeStyle = isMajor ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.3)';
            ctx.lineWidth = isMajor ? 2 : 1;
            ctx.stroke();
        }

        // ---- 方向盘主体（跟随旋转）----
        ctx.save();
        ctx.rotate(this.currentAngle * Math.PI / 180);

        // 外圈（握把）
        ctx.beginPath();
        ctx.arc(0, 0, R, 0, Math.PI * 2);
        ctx.strokeStyle = '#555';
        ctx.lineWidth = this.gripWidth;
        ctx.stroke();

        // 外圈高光
        ctx.beginPath();
        ctx.arc(0, 0, R, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = this.gripWidth - 4;
        ctx.stroke();

        // 三条辐条（顶部居中、左下、右下）
        ctx.lineWidth = 8;
        ctx.lineCap = 'round';

        // 顶部辐条（12 点方向）
        ctx.beginPath();
        ctx.moveTo(0, -R + this.gripWidth / 2);
        ctx.lineTo(0, -this.innerR);
        ctx.strokeStyle = '#666';
        ctx.stroke();

        // 左下辐条（8 点方向，约 240°）
        const blAngle = 240 * Math.PI / 180;
        ctx.beginPath();
        ctx.moveTo(Math.cos(blAngle) * (R - this.gripWidth / 2), Math.sin(blAngle) * (R - this.gripWidth / 2));
        ctx.lineTo(Math.cos(blAngle) * this.innerR, Math.sin(blAngle) * this.innerR);
        ctx.strokeStyle = '#666';
        ctx.stroke();

        // 右下辐条（4 点方向，约 300°）
        const brAngle = 300 * Math.PI / 180;
        ctx.beginPath();
        ctx.moveTo(Math.cos(brAngle) * (R - this.gripWidth / 2), Math.sin(brAngle) * (R - this.gripWidth / 2));
        ctx.lineTo(Math.cos(brAngle) * this.innerR, Math.sin(brAngle) * this.innerR);
        ctx.strokeStyle = '#666';
        ctx.stroke();

        // 中心圆盘
        const hubGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, this.innerR * 0.6);
        hubGrad.addColorStop(0, '#888');
        hubGrad.addColorStop(1, '#444');
        ctx.beginPath();
        ctx.arc(0, 0, this.innerR * 0.55, 0, Math.PI * 2);
        ctx.fillStyle = hubGrad;
        ctx.fill();

        // 中心标志（小圆）
        ctx.beginPath();
        ctx.arc(0, 0, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#aaa';
        ctx.fill();

        // ---- 标记点（红色三角，指示 12 点位置）----
        ctx.beginPath();
        ctx.moveTo(0, -R + this.gripWidth + 4);
        ctx.lineTo(-6, -R + this.gripWidth + 16);
        ctx.lineTo(6, -R + this.gripWidth + 16);
        ctx.closePath();
        ctx.fillStyle = '#ff3333';
        ctx.fill();

        ctx.restore(); // 恢复方向盘旋转
        ctx.restore(); // 恢复 translate
    }
}

// 创建方向盘实例
const steeringWheel = new SteeringWheel('steering-canvas', 'steering-angle');

// =============================================
// 十、第三人称相机
// =============================================

const camTarget = {
    distance: 12,
    minDistance: 5,
    maxDistance: 25,
    height: 5,
    currentPos: new THREE.Vector3(0, 8, 15),
    currentLookAt: new THREE.Vector3(),
};

// =============================================
// 十一、窗口自适应
// =============================================

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// =============================================
// 十二、悬挂调试辅助线
// =============================================

const suspensionHelpers = [];
for (let i = 0; i < 4; i++) {
    const geo = new THREE.CylinderGeometry(0.02, 0.02, 1, 4);
    const mat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
    const helper = new THREE.Mesh(geo, mat);
    scene.add(helper);
    suspensionHelpers.push(helper);
}

// =============================================
// 十三、游戏主循环
// =============================================

const clock = new THREE.Clock();
let physSteps = 0;

function animate() {
    requestAnimationFrame(animate);

    const dt = Math.min(clock.getDelta(), 0.05);

    // ---- 更新方向盘 UI ----
    steeringWheel.update(dt);
    steeringWheel.draw();

    // ---- 获取转向输入 ----
    // 优先使用方向盘拖拽输入，键盘 A/D 作为备选
    let steerInput = steeringWheel.getSteerNormalized();  // 范围 [-1, 1]

    // 如果键盘 A/D 按下，覆盖方向盘输入
    if (keys.has('a')) steerInput = 1;     // 左满舵
    if (keys.has('d')) steerInput = -1;    // 右满舵

    // 将归一化转向值映射到物理转向角（弧度）
    const steerValue = steerInput * VEHICLE_CFG.maxSteerAngle;

    // ---- 引擎力 ----
    let engineForce = 0;
    if (keys.has('w')) engineForce = VEHICLE_CFG.engineForce;
    if (keys.has('s')) engineForce = -VEHICLE_CFG.engineForce * 0.5;

    // ---- 应用力到物理车轮 ----
    driveIndex.forEach(i => vehicle.applyEngineForce(engineForce, i));
    steerIndex.forEach(i => vehicle.setSteeringValue(steerValue, i));

    // 手刹
    for (let i = 0; i < 4; i++) {
        vehicle.setBrake(isBraking ? VEHICLE_CFG.brakeForce : 0, i);
    }

    // ---- 物理世界步进 ----
    world.step(1 / 60, dt, 3);
    physSteps++;

    // ---- 同步 Three.js 视觉模型与物理刚体 ----
    carGroup.position.copy(chassisBody.position);
    carGroup.quaternion.copy(chassisBody.quaternion);

    for (let i = 0; i < 4; i++) {
        const t = vehicle.wheelInfos[i].worldTransform;
        wheelMeshes[i].position.set(t.position.x, t.position.y, t.position.z);
        wheelMeshes[i].quaternion.set(t.quaternion.x, t.quaternion.y, t.quaternion.z, t.quaternion.w);

        // 悬挂辅助线
        const info = vehicle.wheelInfos[i];
        const localConn = new THREE.Vector3().copy(info.chassisConnectionPointLocal);
        localConn.applyQuaternion(new THREE.Quaternion(
            chassisBody.quaternion.x, chassisBody.quaternion.y,
            chassisBody.quaternion.z, chassisBody.quaternion.w
        ));
        const worldConn = new THREE.Vector3().copy(chassisBody.position).add(localConn);

        suspensionHelpers[i].position.copy(worldConn).lerp(wheelMeshes[i].position, 0.5);
        suspensionHelpers[i].lookAt(wheelMeshes[i].position);
        suspensionHelpers[i].rotateX(Math.PI / 2);
        suspensionHelpers[i].scale.y = Math.max(worldConn.distanceTo(wheelMeshes[i].position), 0.01);
    }

    // ---- 相机跟随 ----
    const bodyPos = chassisBody.position;
    const bodyQuat = chassisBody.quaternion;

    const idealOffset = new THREE.Vector3(0, camTarget.height, -camTarget.distance);
    idealOffset.applyQuaternion(new THREE.Quaternion(bodyQuat.x, bodyQuat.y, bodyQuat.z, bodyQuat.w));
    idealOffset.add(new THREE.Vector3(bodyPos.x, bodyPos.y, bodyPos.z));

    const idealLookAt = new THREE.Vector3(bodyPos.x, bodyPos.y + 1.5, bodyPos.z);

    camTarget.currentPos.lerp(idealOffset, 0.08);
    camTarget.currentLookAt.lerp(idealLookAt, 0.08);

    camera.position.copy(camTarget.currentPos);
    camera.lookAt(camTarget.currentLookAt);

    if (keys.has('pageup'))  camTarget.distance = THREE.MathUtils.clamp(camTarget.distance - 5 * dt, camTarget.minDistance, camTarget.maxDistance);
    if (keys.has('pagedown')) camTarget.distance = THREE.MathUtils.clamp(camTarget.distance + 5 * dt, camTarget.minDistance, camTarget.maxDistance);

    // ---- HUD 更新 ----
    const vel = chassisBody.velocity;
    const speed = Math.sqrt(vel.x * vel.x + vel.z * vel.z);
    document.getElementById('speed').textContent = Math.round(speed * 3.6) + ' km/h';

    const pos = chassisBody.position;
    document.getElementById('physics-info').textContent =
        `pos: ${pos.x.toFixed(1)}, ${pos.y.toFixed(1)}, ${pos.z.toFixed(1)} | steer: ${steerInput.toFixed(2)}`;

    renderer.render(scene, camera);
}

animate();
</script>
