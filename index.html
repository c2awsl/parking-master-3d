<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>科目二模拟器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;background:#e8edf2}
canvas{display:block}

#hud{position:fixed;top:16px;left:16px;z-index:10;display:flex;gap:12px}
.hud-card{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,.72);border:1px solid rgba(255,255,255,.5);border-radius:16px;padding:12px 18px;box-shadow:0 4px 24px rgba(0,0,0,.08);min-width:120px}
.hud-card .label{font-size:11px;color:#86868b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.hud-card .value{font-size:22px;font-weight:700;color:#1d1d1f}
.hud-card .unit{font-size:12px;color:#86868b;font-weight:400}
.hud-card .gear{display:inline-block;padding:3px 12px;border-radius:8px;font-size:14px;font-weight:600;margin-top:4px}
.gear-d{background:#34c759;color:#fff}
.gear-r{background:#ff3b30;color:#fff}

#status{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;opacity:0;transition:opacity .4s;font-size:24px;font-weight:700;color:#fff;text-align:center;padding:24px 40px;border-radius:20px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:30}
#status.ok{opacity:1;background:rgba(52,199,89,.85);box-shadow:0 8px 40px rgba(52,199,89,.3)}
#status.fail{opacity:1;background:rgba(255,59,48,.85);box-shadow:0 8px 40px rgba(255,59,48,.3)}
#status.info{opacity:1;background:rgba(0,122,255,.85);box-shadow:0 8px 40px rgba(0,122,255,.3)}

#tabs{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:20;padding:6px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.5);border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.tab{padding:10px 20px;border:none;border-radius:16px;font-size:14px;font-weight:600;cursor:pointer;transition:all .25s;background:transparent;color:#1d1d1f;font-family:inherit;white-space:nowrap}
.tab:hover{background:rgba(0,0,0,.06)}
.tab.active{background:#1d1d1f;color:#fff;box-shadow:0 2px 12px rgba(0,0,0,.15)}

#sub-tabs{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:20;padding:4px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.4);border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,.08);display:none}
.sub-tab{padding:8px 16px;border:none;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;background:transparent;color:#1d1d1f;font-family:inherit}
.sub-tab:hover{background:rgba(0,0,0,.06)}
.sub-tab.active{background:#007aff;color:#fff}

#controls{position:fixed;bottom:24px;right:24px;z-index:10;display:flex;gap:8px}
.ctrl-btn{width:52px;height:52px;border:none;border-radius:16px;font-size:18px;font-weight:600;cursor:pointer;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.5);box-shadow:0 4px 16px rgba(0,0,0,.08);color:#1d1d1f;font-family:inherit;display:flex;align-items:center;justify-content:center;transition:all .2s}
.ctrl-btn:active{transform:scale(.92);background:rgba(0,0,0,.08)}

#cflash{position:fixed;inset:0;background:rgba(255,0,0,0);pointer-events:none;z-index:5;transition:background .05s}
#cflash.on{background:rgba(255,0,0,.12)}

#sw-wrap{position:fixed;bottom:90px;left:24px;z-index:15;pointer-events:auto;display:none}
#sw-canvas{display:block;border-radius:50%;box-shadow:0 4px 20px rgba(0,0,0,.15)}
@media(pointer:coarse),(max-width:900px){
  #sw-wrap{display:block}
  #controls{bottom:90px;right:16px}
  #tabs{bottom:16px;gap:4px;padding:4px}
  .tab{padding:8px 12px;font-size:12px}
  #sub-tabs{bottom:64px}
}
</style>
</head>
<body>
<div id="hud">
  <div class="hud-card"><div class="label">速度</div><div class="value"><span id="spd">0</span> <span class="unit">km/h</span></div></div>
  <div class="hud-card"><div class="label">档位</div><div class="value"><span class="gear gear-d" id="gear">D</span></div></div>
  <div class="hud-card"><div class="label">用时</div><div class="value"><span id="timer">0.0</span><span class="unit">s</span></div></div>
  <div class="hud-card"><div class="label">得分</div><div class="value" id="score">0</div></div>
</div>
<div id="status"></div>
<div id="cflash"></div>
<div id="tabs"></div>
<div id="sub-tabs"></div>
<div id="controls">
  <button class="ctrl-btn" id="btn-view" title="切换视角">👁</button>
  <button class="ctrl-btn" id="btn-reset" title="重置 (R)">↺</button>
</div>
<div id="sw-wrap"><canvas id="sw-canvas" width="150" height="150"></canvas></div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.164.1/build/three.module.js","cannon-es":"https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"}}
</script>
<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xc9d6e0);
scene.fog = new THREE.Fog(0xc9d6e0, 60, 180);
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 500);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.prepend(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const sun = new THREE.DirectionalLight(0xfff5e6, 1.3);
sun.position.set(30, 40, 20); sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
Object.assign(sun.shadow.camera, { near:0.5, far:150, left:-60, right:60, top:60, bottom:-60 });

const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0) });
const defMat = new CANNON.Material('def');
world.defaultContactMaterial = new CANNON.ContactMaterial(defMat, defMat, {
    friction: 0.3, restitution: 0.1, contactEquationStiffness: 1e8, contactEquationRelaxation: 3
});
const gndMat = new CANNON.Material('gnd');
const whlMat = new CANNON.Material('whl');
const wheelGroundContact = new CANNON.ContactMaterial(whlMat, gndMat, {
    friction: 0.6, restitution: 0.0, contactEquationStiffness: 1e8, contactEquationRelaxation: 3
});
world.addContactMaterial(wheelGroundContact);
const wallMat = new CANNON.Material('wall');
world.addContactMaterial(new CANNON.ContactMaterial(wallMat, whlMat, {
    friction: 0.3, restitution: 0.1, contactEquationStiffness: 1e8, contactEquationRelaxation: 3
}));

const gndBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane(), material: gndMat });
gndBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
world.addBody(gndBody);
const gndMesh = new THREE.Mesh(new THREE.PlaneGeometry(300, 300),
    new THREE.MeshStandardMaterial({ color: 0x7a8a7a, roughness: 0.95 }));
gndMesh.rotation.x = -Math.PI / 2; gndMesh.receiveShadow = true;
scene.add(gndMesh);

const roadMat = new THREE.MeshStandardMaterial({ color: 0x6b6b6b, roughness: 0.85 });
function addRoad(x, z, w, d) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, 0.03, d), roadMat);
    m.position.set(x, 0.015, z); m.receiveShadow = true; scene.add(m);
}
addRoad(0, 0, 80, 120);
addRoad(-25, 0, 12, 80);
addRoad(25, 0, 12, 80);

const fenceMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.3, metalness: 0.7 });
const fencePole = new THREE.CylinderGeometry(0.05, 0.05, 1.2, 6);
const fenceRail = new THREE.CylinderGeometry(0.02, 0.02, 1, 4);
[[30,60],[30,-60],[-30,60],[-30,-60],[0,60],[0,-60]].forEach(([x,z]) => {
    const p = new THREE.Mesh(fencePole, fenceMat); p.position.set(x, 0.6, z); p.castShadow = true; scene.add(p);
});
const treeMat = new THREE.MeshStandardMaterial({ color: 0x4a8c3f, roughness: 0.8 });
const trunkMat = new THREE.MeshStandardMaterial({ color: 0x6b4226, roughness: 0.9 });
[[35,20],[-35,20],[35,-20],[-35,-20],[35,50],[-35,50],[35,-50],[-35,-50]].forEach(([x,z]) => {
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 2, 8), trunkMat);
    trunk.position.set(x, 1, z); trunk.castShadow = true; scene.add(trunk);
    const crown = new THREE.Mesh(new THREE.SphereGeometry(1.2, 8, 6), treeMat);
    crown.position.set(x, 2.8, z); crown.castShadow = true; scene.add(crown);
});

const VC = { wR:0.3, sStiff:30, sRest:0.2, dRelax:2.3, dComp:4.4, maxSF:100000, maxST:0.2, rollI:0.01, maxSteer:0.6, engineF:600, brakeF:50, mass:150 };
const chassisBody = new CANNON.Body({
    mass: VC.mass, shape: new CANNON.Box(new CANNON.Vec3(1, 0.35, 2)),
    position: new CANNON.Vec3(0, VC.wR + VC.sRest + 0.35, 0),
});
world.addBody(chassisBody);
const veh = new CANNON.RaycastVehicle({ chassisBody, indexRightAxis:0, indexUpAxis:1, indexForwardAxis:2 });
const wP = [new CANNON.Vec3(-1,0,1.4), new CANNON.Vec3(1,0,1.4), new CANNON.Vec3(-1,0,-1.4), new CANNON.Vec3(1,0,-1.4)];
const sI=[0,1], dI=[2,3];
wP.forEach(p => veh.addWheel({
    radius:VC.wR, directionLocal:new CANNON.Vec3(0,-1,0),
    suspensionStiffness:VC.sStiff, suspensionRestLength:VC.sRest,
    maxSuspensionTravel:VC.maxST, dampingRelaxation:VC.dRelax,
    dampingCompression:VC.dComp, maxSuspensionForce:VC.maxSF,
    rollInfluence:VC.rollI, axleLocal:new CANNON.Vec3(-1,0,0),
    chassisConnectionPointLocal:p, customSlidingRotationalSpeed:-30,
    useCustomSlidingRotationalSpeed:true
}));
veh.addToWorld(world);

const carG = new THREE.Group();
const bodyMat = new THREE.MeshStandardMaterial({ color:0xf5f5f5, roughness:0.2, metalness:0.5 });
const darkMat = new THREE.MeshStandardMaterial({ color:0x1a1a1a, roughness:0.6 });
const chromeMat = new THREE.MeshStandardMaterial({ color:0xdddddd, roughness:0.05, metalness:0.95 });
const glassMat = new THREE.MeshStandardMaterial({ color:0x88bbdd, transparent:true, opacity:0.4, roughness:0.05, metalness:0.5 });
const tailMat = new THREE.MeshStandardMaterial({ color:0xcc2222, emissive:0xcc0000, emissiveIntensity:0.35, roughness:0.3 });
const headMat = new THREE.MeshStandardMaterial({ color:0xffffee, emissive:0xffffcc, emissiveIntensity:0.5, roughness:0.15 });
const turnMat = new THREE.MeshStandardMaterial({ color:0xffaa00, emissive:0xff8800, emissiveIntensity:0.3 });
const reflectorMat = new THREE.MeshStandardMaterial({ color:0xff3333, emissive:0xff0000, emissiveIntensity:0.2 });
const sideTrimMat = new THREE.MeshStandardMaterial({ color:0x333333, roughness:0.4 });

function addBox(parent, geo, mat, x, y, z, rx, ry, rz) {
    const m = new THREE.Mesh(geo, mat); m.position.set(x,y,z);
    if(rx) m.rotation.x=rx; if(ry) m.rotation.y=ry; if(rz) m.rotation.z=rz;
    m.castShadow=true; parent.add(m); return m;
}
addBox(carG, new THREE.BoxGeometry(1.85,0.4,4.2), bodyMat, 0, 0.0, 0);
addBox(carG, new THREE.BoxGeometry(1.75,0.18,1.3), bodyMat, 0, 0.28, 1.15);
addBox(carG, new THREE.BoxGeometry(1.65,0.16,1.0), bodyMat, 0, 0.3, -1.3);
addBox(carG, new THREE.BoxGeometry(1.55,0.5,1.9), bodyMat, 0, 0.62, -0.15);
addBox(carG, new THREE.BoxGeometry(1.45,0.05,1.5), bodyMat, 0, 0.9, -0.15);
addBox(carG, new THREE.BoxGeometry(1.48,0.48,0.04), glassMat, 0, 0.7, 0.75, -0.3);
addBox(carG, new THREE.BoxGeometry(1.42,0.42,0.04), glassMat, 0, 0.68, -0.95, 0.22);
addBox(carG, new THREE.BoxGeometry(0.04,0.35,1.4), glassMat, -0.78, 0.68, -0.15);
addBox(carG, new THREE.BoxGeometry(0.04,0.35,1.4), glassMat, 0.78, 0.68, -0.15);
addBox(carG, new THREE.BoxGeometry(1.9,0.24,0.12), darkMat, 0, 0.04, 2.08);
addBox(carG, new THREE.BoxGeometry(1.1,0.16,0.05), darkMat, 0, 0.14, 2.1);
for(let i=0;i<4;i++) addBox(carG, new THREE.BoxGeometry(1.0,0.012,0.06), chromeMat, 0, 0.08+i*0.04, 2.11);
[-0.65,0.65].forEach(x => addBox(carG, new THREE.BoxGeometry(0.32,0.12,0.06), headMat, x, 0.2, 2.08));
[-0.9,0.9].forEach(x => addBox(carG, new THREE.BoxGeometry(0.1,0.08,0.05), turnMat, x, 0.2, 2.08));
addBox(carG, new THREE.BoxGeometry(1.9,0.26,0.1), darkMat, 0, 0.04, -2.08);
[-0.68,0.68].forEach(x => addBox(carG, new THREE.BoxGeometry(0.32,0.14,0.05), tailMat, x, 0.2, -2.09));
[-0.92,0.92].forEach(x => addBox(carG, new THREE.BoxGeometry(0.08,0.06,0.04), turnMat, x, 0.2, -2.09));
addBox(carG, new THREE.BoxGeometry(0.35,0.1,0.01), new THREE.MeshStandardMaterial({color:0x1a1a1a}), 0, 0.05, 2.12);
addBox(carG, new THREE.BoxGeometry(0.3,0.07,0.01), new THREE.MeshStandardMaterial({color:0xffffff}), 0, 0.05, 2.13);
addBox(carG, new THREE.BoxGeometry(0.35,0.1,0.01), new THREE.MeshStandardMaterial({color:0x1a1a1a}), 0, 0.05, -2.11);
addBox(carG, new THREE.BoxGeometry(0.3,0.07,0.01), new THREE.MeshStandardMaterial({color:0xffffff}), 0, 0.05, -2.12);
[-0.55,0.55].forEach(x => {
    const e = new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.035,0.1,8), chromeMat);
    e.rotation.x = Math.PI/2; e.position.set(x, -0.16, -2.12); carG.add(e);
});
[-1,1].forEach(s => {
    addBox(carG, new THREE.BoxGeometry(0.04,0.03,0.12), bodyMat, s*0.98, 0.5, 0.7);
    addBox(carG, new THREE.BoxGeometry(0.14,0.08,0.06), bodyMat, s*1.06, 0.5, 0.7);
    addBox(carG, new THREE.BoxGeometry(0.02,0.06,0.05), chromeMat, s*1.14, 0.5, 0.7);
});
[-0.94,0.94].forEach(x => {
    addBox(carG, new THREE.BoxGeometry(0.03,0.44,0.06), darkMat, x, 0.62, -0.1);
    addBox(carG, new THREE.BoxGeometry(0.02,0.02,0.08), chromeMat, x*1.01, 0.38, -0.1);
});
addBox(carG, new THREE.BoxGeometry(1.88,0.02,3.8), sideTrimMat, -0.94, 0.18, 0);
addBox(carG, new THREE.BoxGeometry(1.88,0.02,3.8), sideTrimMat, 0.94, 0.18, 0);
scene.add(carG);

const whMeshes = [];
const tireMat = new THREE.MeshStandardMaterial({ color:0x222222, roughness:0.85 });
const hubMat = new THREE.MeshStandardMaterial({ color:0xcccccc, roughness:0.15, metalness:0.9 });
for(let i=0; i<4; i++) {
    const wg = new THREE.Group();
    const t = new THREE.Mesh(new THREE.CylinderGeometry(VC.wR, VC.wR, 0.22, 20), tireMat);
    t.rotation.z = Math.PI/2; t.castShadow = true; wg.add(t);
    const h = new THREE.Mesh(new THREE.CylinderGeometry(0.17, 0.17, 0.23, 12), hubMat);
    h.rotation.z = Math.PI/2; wg.add(h);
    scene.add(wg); whMeshes.push(wg);
}

const LEVELS = [
  { id:'reverse', name:'倒车入库', subs:[
    { label:'第1把', cx:22, cz:20, w:3.6, d:5.6, angle:0, spawn:{x:22,z:6,ry:0} },
    { label:'第2把', cx:-18, cz:18, w:3.6, d:5.6, angle:0, spawn:{x:-18,z:4,ry:0} },
  ]},
  { id:'side', name:'侧方停车', subs:[
    { label:'第1把', cx:0, cz:22, w:2.8, d:6.5, angle:0, spawn:{x:0,z:30,ry:0} },
    { label:'第2把', cx:20, cz:-20, w:2.8, d:6.5, angle:0, spawn:{x:20,z:-12,ry:0} },
  ]},
  { id:'scurve', name:'曲线行驶', subs:[
    { label:'标准', spawn:{x:0,z:45,ry:0}, dir:'south' },
  ]},
  { id:'rightangle', name:'直角转弯', subs:[
    { label:'左转', spawn:{x:-25,z:25,ry:0}, dir:'south', turn:'left' },
    { label:'右转', spawn:{x:25,z:25,ry:0}, dir:'south', turn:'right' },
  ]},
  { id:'hill', name:'坡道起步', subs:[
    { label:'标准', spawn:{x:0,z:-5,ry:0} },
  ]},
];

let trackBodies = [], trackGroup = null;
let curLevel = LEVELS[0], curSub = curLevel.subs[0], curSubIdx = 0;

function clearTrack() {
    trackBodies.forEach(b => world.removeBody(b)); trackBodies = [];
    if(trackGroup) { scene.remove(trackGroup); trackGroup = null; }
}
function addWallPhys(x, z, he) {
    const b = new CANNON.Body({ mass:0, material:wallMat, shape:new CANNON.Box(new CANNON.Vec3(he[0],he[1],he[2])),
        position: new CANNON.Vec3(x, he[1], z) });
    b.userData = { type:'parking_wall' };
    world.addBody(b); trackBodies.push(b);
}
function wallVis(x, z, sx, sy, sz, c, op) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(sx,sy,sz),
        new THREE.MeshStandardMaterial({ color:c, transparent:op<1, opacity:op, roughness:0.5 }));
    m.position.set(x, sy/2, z); m.castShadow = true; return m;
}
function lineVis(x, z, sx, sz, c) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(sx, 0.02, sz),
        new THREE.MeshStandardMaterial({ color:c, emissive:new THREE.Color(c).multiplyScalar(0.15) }));
    m.position.set(x, 0.025, z); return m;
}

function buildReverseTrack(sub) {
    const g = new THREE.Group();
    const {cx,cz,w,d} = sub, hW=w/2, hD=d/2;
    g.add(lineVis(cx-hW, cz, 0.1, d, 0x00cc55));
    g.add(lineVis(cx+hW, cz, 0.1, d, 0x00cc55));
    g.add(lineVis(cx, cz+hD, w+0.2, 0.1, 0x00cc55));
    g.add(lineVis(cx, cz-hD, w+0.15, 0.1, 0xffffff));
    for(let z = cz-hD+0.5; z<cz+hD; z+=1.2) g.add(lineVis(cx, z, w*0.6, 0.06, 0xffffff));
    g.add(wallVis(cx, cz-hD-0.5, w+0.4, 0.04, 0.3, 0x44aa66, 0.4));
    const wh=1.2, wt=0.12;
    [{x:cx-hW-wt/2,z:cz,hx:wt/2,hz:d/2+wt},{x:cx+hW+wt/2,z:cz,hx:wt/2,hz:d/2+wt},{x:cx,z:cz+hD+wt/2,hx:w/2+wt,hz:wt/2}]
        .forEach(({x,z,hx,hz}) => { g.add(wallVis(x,z,hx*2,wh*2,hz*2,0x44aa66,0.25)); addWallPhys(x,z,[hx,wh/2,hz]); });
    return g;
}
function buildSideTrack(sub) {
    const g = new THREE.Group();
    const {cx,cz,w,d} = sub, hW=w/2, hD=d/2;
    g.add(lineVis(cx-hW, cz, 0.1, d, 0x00cc55));
    g.add(lineVis(cx+hW, cz, 0.1, d, 0x00cc55));
    g.add(lineVis(cx, cz+hD, w+0.2, 0.1, 0x00cc55));
    g.add(lineVis(cx, cz-hD, w+0.2, 0.1, 0x00cc55));
    const wh=1.0, wt=0.12;
    [{x:cx-hW-wt/2,z:cz,hx:wt/2,hz:d/2+wt},{x:cx+hW+wt/2,z:cz,hx:wt/2,hz:d/2+wt},{x:cx,z:cz+hD+wt/2,hx:w/2+wt,hz:wt/2}]
        .forEach(({x,z,hx,hz}) => { g.add(wallVis(x,z,hx*2,wh*2,hz*2,0x44aa66,0.25)); addWallPhys(x,z,[hx,wh/2,hz]); });
    return g;
}
function buildSCurveTrack(sub) {
    const g = new THREE.Group();
    const bx=sub.spawn.x, bz=sub.spawn.z, lw=3.5, wh=0.8;
    const segs = [[0,0],[0,-8],[6,-16],[6,-24],[0,-32],[0,-40]];
    for(let i=0;i<segs.length-1;i++){
        const ax=bx+segs[i][0], az=bz+segs[i][1], bxx=bx+segs[i+1][0], bzz=bz+segs[i+1][1];
        const mx=(ax+bxx)/2, mz=(az+bzz)/2, dx=bxx-ax, dz=bzz-az, len=Math.sqrt(dx*dx+dz*dz)+lw*2;
        const ang=Math.atan2(dx,dz);
        [-1,1].forEach(off => {
            const nx=Math.cos(ang)*off*lw, nz=-Math.sin(ang)*off*lw;
            g.add(lineVis(mx+nx,mz+nz,0.1,len,0xffcc00));
            g.add(wallVis(mx+nx,mz+nz,0.08,wh*2,len,0x44aa66,0.2));
            addWallPhys(mx+nx,mz+nz,[0.04,wh/2,len/2]);
        });
    }
    return g;
}
function buildRightAngleTrack(sub) {
    const g = new THREE.Group();
    const bx=sub.spawn.x, bz=sub.spawn.z, lw=3.5, wh=0.8;
    const segs = sub.turn==='left' ? [[0,0],[0,-10],[-10,-10]] : [[0,0],[0,-10],[10,-10]];
    for(let i=0;i<segs.length-1;i++){
        const ax=bx+segs[i][0], az=bz+segs[i][1], bxx=bx+segs[i+1][0], bzz=bz+segs[i+1][1];
        const mx=(ax+bxx)/2, mz=(az+bzz)/2, dx=bxx-ax, dz=bzz-az, len=Math.sqrt(dx*dx+dz*dz)+lw*2;
        const ang=Math.atan2(dx,dz);
        [-1,1].forEach(off => {
            const nx=Math.cos(ang)*off*lw, nz=-Math.sin(ang)*off*lw;
            g.add(lineVis(mx+nx,mz+nz,0.1,len,0xffcc00));
            g.add(wallVis(mx+nx,mz+nz,0.08,wh*2,len,0x44aa66,0.2));
            addWallPhys(mx+nx,mz+nz,[0.04,wh/2,len/2]);
        });
    }
    return g;
}
function buildHillTrack(sub) {
    const g = new THREE.Group();
    const bx=sub.spawn.x, bz=sub.spawn.z;
    const rampLen=14, rampW=3.8, rampH=2.8, wh=1.2;
    const rampMat2 = new THREE.MeshStandardMaterial({ color:0x888888, roughness:0.7 });
    const ramp = new THREE.Mesh(new THREE.BoxGeometry(rampW, 0.3, rampLen), rampMat2);
    ramp.position.set(bx, rampH/2, bz+rampLen/2);
    ramp.rotation.x = -Math.atan2(rampH, rampLen);
    ramp.castShadow=true; ramp.receiveShadow=true; g.add(ramp);
    const rb = new CANNON.Body({mass:0, material:gndMat, shape:new CANNON.Box(new CANNON.Vec3(rampW/2,0.15,rampLen/2)),
        position:new CANNON.Vec3(bx, rampH/2, bz+rampLen/2)});
    rb.quaternion.setFromEuler(-Math.atan2(rampH,rampLen),0,0);
    world.addBody(rb); trackBodies.push(rb);
    const top = new THREE.Mesh(new THREE.BoxGeometry(rampW,0.3,5), rampMat2);
    top.position.set(bx, rampH+0.15, bz+rampLen+2.5); top.castShadow=true; g.add(top);
    const tb = new CANNON.Body({mass:0, material:gndMat, shape:new CANNON.Box(new CANNON.Vec3(rampW/2,0.15,2.5)),
        position:new CANNON.Vec3(bx, rampH+0.15, bz+rampLen+2.5)});
    world.addBody(tb); trackBodies.push(tb);
    g.add(lineVis(bx, bz+rampLen+2.5, rampW+0.5, 0.15, 0xff3333));
    g.add(lineVis(bx, bz+1, rampW+0.5, 0.15, 0x33cc55));
    g.add(wallVis(bx-rampW/2-0.08, bz+rampLen/2, 0.12, wh*2, rampLen, 0x44aa66, 0.2));
    g.add(wallVis(bx+rampW/2+0.08, bz+rampLen/2, 0.12, wh*2, rampLen, 0x44aa66, 0.2));
    addWallPhys(bx-rampW/2-0.08, bz+rampLen/2, [0.06,wh/2,rampLen/2]);
    addWallPhys(bx+rampW/2+0.08, bz+rampLen/2, [0.06,wh/2,rampLen/2]);
    return g;
}

function buildTrack(id, sub) {
    switch(id) {
        case 'reverse': return buildReverseTrack(sub);
        case 'side': return buildSideTrack(sub);
        case 'scurve': return buildSCurveTrack(sub);
        case 'rightangle': return buildRightAngleTrack(sub);
        case 'hill': return buildHillTrack(sub);
    }
}

let gear='D', score_=0, levelTime=0, parkingDone=false, statusTimer=0, collisionTimer=0;
const gearEl=document.getElementById('gear'), statusEl=document.getElementById('status'), cflash=document.getElementById('cflash');
function updateGearUI(){gearEl.textContent=gear;gearEl.className='gear '+(gear==='D'?'gear-d':'gear-r');}
function showStatus(t,cls,d){statusEl.textContent=t;statusEl.className=cls;statusTimer=d;}

function loadLevel(id, idx) {
    clearTrack();
    curLevel = LEVELS.find(l=>l.id===id); curSubIdx = idx % curLevel.subs.length;
    curSub = curLevel.subs[curSubIdx];
    trackGroup = buildTrack(id, curSub); scene.add(trackGroup);
    resetCar();
}

function resetCar() {
    const s = curSub.spawn;
    chassisBody.position.set(s.x, VC.wR+VC.sRest+0.35, s.z);
    chassisBody.quaternion.set(0,0,0,1);
    chassisBody.velocity.set(0,0,0); chassisBody.angularVelocity.set(0,0,0);
    if(s.ry) chassisBody.quaternion.setFromEuler(0, s.ry, 0);
    for(let i=0;i<4;i++){veh.setBrake(0,i);veh.applyEngineForce(0,i);veh.setSteeringValue(0,i);}
    gear='D'; updateGearUI(); parkingDone=false; levelTime=0; hillStopped=false; hillStopTimer=0;
    cam.curPos.set(s.x, 8, s.z-12);
    cam.curLook.set(s.x, 1, s.z);
    showStatus(curLevel.name+' - '+curSub.label, 'info', 2);
}

const keys=new Set();
let isBraking=false, wantReset=false, touchGas=false, touchBrk=false;
window.addEventListener('keydown',e=>{
    keys.add(e.key.toLowerCase());
    if(['arrowup','arrowdown','arrowleft','arrowright'].includes(e.key.toLowerCase()))e.preventDefault();
    if(e.key===' '){isBraking=true;e.preventDefault();}
    if(e.key.toLowerCase()==='r'&&!e.repeat){const v=chassisBody.velocity;if(Math.sqrt(v.x*v.x+v.z*v.z)<0.5)wantReset=true;}
    if(e.key.toLowerCase()==='c'&&!e.repeat){camMode=camMode==='follow'?'driver':'follow';}
});
window.addEventListener('keyup',e=>{keys.delete(e.key.toLowerCase());if(e.key===' ')isBraking=false;});
document.getElementById('btn-reset').onclick=()=>{wantReset=true;};
document.getElementById('btn-view').onclick=()=>{camMode=camMode==='follow'?'driver':'follow';};

const isMobile=matchMedia('(pointer:coarse)').matches||innerWidth<900;
if(isMobile){
    const bind=(el,flag,val)=>{
        el.addEventListener('touchstart',e=>{e.preventDefault();window[flag]=val;el.style.background='rgba(0,0,0,.15)';},{passive:false});

    };

class SteeringWheel {
    constructor(id,maxA){
        this.cv=document.getElementById(id);if(!this.cv)return;
        this.ctx=this.cv.getContext('2d');this.sz=this.cv.width;this.cx=this.sz/2;this.cy=this.sz/2;
        this.R=this.sz/2-6;this.iR=this.R*0.55;this.ang=0;this.maxA=maxA||270;
        this.drag=false;this.da0=0;this.dr0=0;this.spring=false;this.sv=0;this._bind();
    }
    _bind(){
        if(!this.cv)return;
        const c=this.cv,dn=e=>this._down(e),mv=e=>this._move(e),up=()=>this._up();
        c.addEventListener('mousedown',dn);window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);
        c.addEventListener('touchstart',e=>{e.preventDefault();this._down(e.touches[0]);},{passive:false});
        window.addEventListener('touchmove',e=>{if(this.drag)this._move(e.touches[0]);},{passive:false});
        window.addEventListener('touchend',up);
    }
    _a(e){const r=this.cv.getBoundingClientRect();return Math.atan2(e.clientY-r.top-this.cy,e.clientX-r.left-this.cx)*180/Math.PI;}
    _down(e){const r=this.cv.getBoundingClientRect(),dx=e.clientX-r.left-this.cx,dy=e.clientY-r.top-this.cy;
        if(Math.sqrt(dx*dx+dy*dy)>this.R+30)return;this.drag=true;this.spring=false;this.sv=0;this.da0=this._a(e);this.dr0=this.ang;}
    _move(e){if(!this.drag)return;let d=this._a(e)-this.da0;if(d>180)d-=360;if(d<-180)d+=360;
        this.ang=THREE.MathUtils.clamp(this.dr0+d,-this.maxA,this.maxA);}
    _up(){if(this.drag){this.drag=false;this.spring=true;}}
    update(dt){if(this.spring&&!this.drag){const f=-14*this.ang-7*this.sv;this.sv+=f*dt;this.ang+=this.sv*dt;
        if(Math.abs(this.ang)<0.3&&Math.abs(this.sv)<1){this.ang=0;this.sv=0;this.spring=false;}}}
    norm(){return this.ang/this.maxA;}
    draw(){
        if(!this.ctx)return;
        const{ctx,cx,cy,R,iR}=this,gw=14;
        ctx.clearRect(0,0,this.sz,this.sz);ctx.save();ctx.translate(cx,cy);
        ctx.save();ctx.rotate(this.ang*Math.PI/180);
        const rg=ctx.createRadialGradient(0,0,R-gw,0,0,R+2);
        rg.addColorStop(0,'#444');rg.addColorStop(1,'#222');
        ctx.beginPath();ctx.arc(0,0,R,0,Math.PI*2);ctx.lineWidth=gw;ctx.strokeStyle=rg;ctx.stroke();
        [Math.PI+Math.PI/6,-Math.PI/6,Math.PI/2].forEach((a,idx)=>{
            ctx.save();ctx.rotate(a);ctx.fillStyle='#555';ctx.beginPath();
            if(idx<2){ctx.moveTo(R-gw,-5);ctx.lineTo(iR,-4);ctx.lineTo(iR,4);ctx.lineTo(R-gw,5);}
            else{ctx.moveTo(-5,R-gw);ctx.lineTo(-4,iR);ctx.lineTo(4,iR);ctx.lineTo(5,R-gw);}
            ctx.closePath();ctx.fill();ctx.restore();
        });
        const cR=iR*0.75;
        const cg=ctx.createRadialGradient(0,0,0,0,0,cR);cg.addColorStop(0,'#666');cg.addColorStop(1,'#333');
        ctx.beginPath();ctx.arc(0,0,cR,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();
        ctx.beginPath();ctx.moveTo(0,-R+gw+2);ctx.lineTo(-3,-R+gw+8);ctx.lineTo(3,-R+gw+8);ctx.closePath();ctx.fillStyle='#f33';ctx.fill();
        ctx.restore();ctx.restore();
    }
}
const sw = new SteeringWheel(isMobile?'sw-canvas':'sw-canvas',270);

let camMode='follow';
const cam={dist:14,minD:5,maxD:28,h:6,curPos:new THREE.Vector3(0,8,-12),curLook:new THREE.Vector3(0,1,0)};

const guideGroup=new THREE.Group(); scene.add(guideGroup);
const guideMat=new THREE.LineBasicMaterial({color:0xffff00,transparent:true,opacity:0.5});
function updateGuideLines(sv){
    while(guideGroup.children.length) guideGroup.remove(guideGroup.children[0]);
    if(camMode==='driver')return;
    const p=chassisBody.position, q=chassisBody.quaternion;
    const q3=new THREE.Quaternion(q.x,q.y,q.z,q.w);const pts=[];
    for(let i=0;i<=15;i++){const t=i/15;const lz=-2-t*8;const lx=sv*lz*1.2;
        const pt=new THREE.Vector3(lx,0.05,lz).applyQuaternion(q3).add(new THREE.Vector3(p.x,p.y,p.z));pts.push(pt);}
    guideGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),guideMat));
}

chassisBody.addEventListener('collide',e=>{if(e.body.userData&&e.body.userData.type==='parking_wall')collisionTimer=1.0;});

let hillStopped=false, hillStopTimer=0;
function checkComplete(){
    if(parkingDone)return;
    const p=chassisBody.position;
    switch(curLevel.id){
        case 'reverse':{
            const s=curSub,hW=s.w/2-0.3,hD=s.d/2-0.3;
            if(p.x>s.cx-hW&&p.x<s.cx+hW&&p.z>s.cz-hD&&p.z<s.cz+hD){
                const eq=new THREE.Quaternion(chassisBody.quaternion.x,chassisBody.quaternion.y,chassisBody.quaternion.z,chassisBody.quaternion.w);
                let yaw=THREE.MathUtils.radToDeg(new THREE.Euler().setFromQuaternion(eq,'YXZ').y);
                while(yaw>180)yaw-=360;while(yaw<-180)yaw+=360;
                let diff=Math.abs(yaw-THREE.MathUtils.radToDeg(s.angle||0));if(diff>180)diff=360-diff;
                if(diff<15) win();
            }break;}
        case 'side':{
            const s=curSub,hW=s.w/2-0.3,hD=s.d/2-0.3;
            if(p.x>s.cx-hW&&p.x<s.cx+hW&&p.z>s.cz-hD&&p.z<s.cz+hD){
                const eq=new THREE.Quaternion(chassisBody.quaternion.x,chassisBody.quaternion.y,chassisBody.quaternion.z,chassisBody.quaternion.w);
                let yaw=THREE.MathUtils.radToDeg(new THREE.Euler().setFromQuaternion(eq,'YXZ').y);
                while(yaw>180)yaw-=360;while(yaw<-180)yaw+=360;
                if(Math.abs(yaw)<20) win();
            }break;}
        case 'scurve':{
            const s=curSub.spawn;
            const dist=Math.sqrt((p.x-s.x)**2+(p.z-s.z)**2);
            const vel=chassisBody.velocity;const spd=Math.sqrt(vel.x*vel.x+vel.z*vel.z);
            if(dist>35&&spd>0.3) win();
            if(p.z>s.z+5||p.z<s.z-48||Math.abs(p.x-s.x)>12) fail('驶出赛道！');
            break;}
        case 'rightangle':{
            const s=curSub.spawn;
            const dist=Math.sqrt((p.x-s.x)**2+(p.z-s.z)**2);
            const vel=chassisBody.velocity;const spd=Math.sqrt(vel.x*vel.x+vel.z*vel.z);
            if(dist>16&&spd>0.2) win();
            if(p.z>s.z+3||Math.abs(p.x-s.x)>16) fail('驶出赛道！');
            break;}
        case 'hill':{
            const s=curSub.spawn;
            const atStop=Math.abs(p.z-(s.z+16))<2&&Math.abs(p.x-s.x)<2;
            const vel=chassisBody.velocity;const spd=Math.sqrt(vel.x*vel.x+vel.z*vel.z);
            if(atStop&&spd<0.3&&!hillStopped){hillStopTimer+=1/60;if(hillStopTimer>1){hillStopped=true;showStatus('定点停车成功！起步通过','ok',2);}}
            if(hillStopped&&p.z>s.z+22&&spd>0.3) win();
            if(Math.abs(p.x-s.x)>2.2) fail('驶出赛道！');
            break;}
    }
}
function win(){
    parkingDone=true;
    const pts=Math.max(100-Math.round(levelTime*5),10); score_+=pts;
    document.getElementById('score').textContent=score_;
    showStatus('通过! +'+pts+'分','ok',3);
    setTimeout(()=>{
        if(curSubIdx<curLevel.subs.length-1) loadLevel(curLevel.id, curSubIdx+1);
        else showStatus('项目完成!','ok',3);
    },3500);
}
function fail(msg){parkingDone=true;showStatus('失败: '+msg,'fail',3);setTimeout(resetCar,3500);}

function getTuning(){return {steerMul:1,engineF:600,brakeF:50,maxSteer:0.6};}

const clock=new THREE.Clock();
const camHint=document.getElementById('btn-view');

loadLevel('reverse',0);

function animate(){
    requestAnimationFrame(animate);
    const dt=Math.min(clock.getDelta(),0.05);
    if(sw){sw.update(dt);sw.draw();}
    if(wantReset){wantReset=false;resetCar();}
    const tuning=getTuning();
    let steerN=sw?sw.norm():0;
    if(keys.has('a')||keys.has('arrowleft'))steerN=1;
    if(keys.has('d')||keys.has('arrowright'))steerN=-1;
    steerN=THREE.MathUtils.clamp(steerN*tuning.steerMul,-1,1);
    const steerV=steerN*tuning.maxSteer;
    let engF=0;
    if(keys.has('w')||keys.has('arrowup')||touchGas) engF=gear==='D'?tuning.engineF:-tuning.engineF*0.5;
    if(keys.has('s')||keys.has('arrowdown')||touchBrk) engF=gear==='D'?-tuning.engineF*0.5:tuning.engineF;
    dI.forEach(i=>veh.applyEngineForce(engF,i));
    sI.forEach(i=>veh.setSteeringValue(steerV,i));
    for(let i=0;i<4;i++)veh.setBrake(isBraking?tuning.brakeF:0,i);
    world.step(1/60,dt,3);
    carG.position.copy(chassisBody.position);
    carG.quaternion.copy(chassisBody.quaternion);
    for(let i=0;i<4;i++){
        const t=veh.wheelInfos[i].worldTransform;
        whMeshes[i].position.set(t.position.x,t.position.y,t.position.z);
        whMeshes[i].quaternion.set(t.quaternion.x,t.quaternion.y,t.quaternion.z,t.quaternion.w);
    }
    if(collisionTimer>0){collisionTimer-=dt;cflash.classList.add('on');if(collisionTimer<=0)cflash.classList.remove('on');}
    if(statusTimer>0){statusTimer-=dt;if(statusTimer<=0)statusEl.className='';}
    if(!parkingDone){checkComplete();levelTime+=dt;}
    const bP=chassisBody.position,bQ=chassisBody.quaternion;
    if(camMode==='follow'){
        const iOff=new THREE.Vector3(0,cam.h,-cam.dist);
        iOff.applyQuaternion(new THREE.Quaternion(bQ.x,bQ.y,bQ.z,bQ.w));
        iOff.add(new THREE.Vector3(bP.x,bP.y,bP.z));
        const iLA=new THREE.Vector3(bP.x,bP.y+1.5,bP.z);
        cam.curPos.lerp(iOff,0.06);cam.curLook.lerp(iLA,0.08);
        camera.position.copy(cam.curPos);camera.lookAt(cam.curLook);
        carG.visible=true;
    } else {
        const q=new THREE.Quaternion(bQ.x,bQ.y,bQ.z,bQ.w);
        const fwd=new THREE.Vector3(0,0.4,0.5).applyQuaternion(q);
        const up=new THREE.Vector3(0,1,0).applyQuaternion(q);
        camera.position.set(bP.x+fwd.x*0.3,bP.y+fwd.y+up.y*0.5,bP.z+fwd.z*0.3);
        const look=new THREE.Vector3(0,0.3,8).applyQuaternion(q);
        camera.lookAt(bP.x+look.x,bP.y+look.y+0.3,bP.z+look.z);
        carG.visible=false;
    }
    if(keys.has('pageup'))cam.dist=THREE.MathUtils.clamp(cam.dist-5*dt,cam.minD,cam.maxD);
    if(keys.has('pagedown'))cam.dist=THREE.MathUtils.clamp(cam.dist+5*dt,cam.minD,cam.maxD);
    updateGuideLines(steerV);
    const vel=chassisBody.velocity;const spd=Math.sqrt(vel.x*vel.x+vel.z*vel.z);
    document.getElementById('spd').textContent=Math.round(spd*3.6);
    document.getElementById('timer').textContent=levelTime.toFixed(1);
    renderer.render(scene,camera);
}
