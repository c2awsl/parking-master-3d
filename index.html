<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>倒车入库模拟器 - Three.js + Cannon-es</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;background:#000;font-family:'Consolas','Courier New',monospace}
        canvas{display:block}

        /* ---- HUD 布局 ---- */
        #hud-left{position:absolute;top:16px;left:16px;pointer-events:none;color:#fff;font-size:13px;line-height:1.7;background:rgba(0,0,0,.55);padding:10px 14px;border-radius:8px;min-width:160px}
        #hud-left .speed{font-size:28px;font-weight:bold;color:#0f0}
        #hud-left .gear{display:inline-block;padding:2px 10px;border-radius:4px;font-size:16px;font-weight:bold;margin-left:6px}
        #hud-left .gear-d{background:rgba(0,200,0,.25);color:#0f0;border:1px solid #0f0}
        #hud-left .gear-r{background:rgba(200,0,0,.25);color:#f44;border:1px solid #f44}

        #hud-right{position:absolute;top:16px;right:16px;pointer-events:none;color:#fff;font-size:13px;background:rgba(0,0,0,.55);padding:10px 14px;border-radius:8px;line-height:1.7;min-width:150px}
        #hud-right .level{font-size:18px;font-weight:bold;color:#ff0}
        #hud-right .score{color:#0ff}
        #hud-right .timer{color:#fa0}

        #hud-bottom{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);pointer-events:none;color:rgba(255,255,255,.55);font-size:11px;text-align:center;background:rgba(0,0,0,.4);padding:6px 16px;border-radius:6px}

        /* ---- 停车状态 ---- */
        #park-status{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;opacity:0;transition:opacity .4s;font-size:22px;font-weight:bold;color:#fff;text-shadow:0 0 20px currentColor;padding:20px 40px;border-radius:12px;z-index:30}
        #park-status.ok{opacity:1;color:#0f0;background:rgba(0,100,0,.75);border:2px solid #0f0}
        #park-status.fail{opacity:1;color:#f44;background:rgba(100,0,0,.75);border:2px solid #f44}
        #park-status.info{opacity:1;color:#ff0;background:rgba(80,60,0,.75);border:2px solid #ff0}

        /* ---- 右侧诊断 ---- */
        #diag{position:absolute;bottom:16px;right:16px;pointer-events:none;color:#fa0;font-size:11px;background:rgba(0,0,0,.5);padding:6px 10px;border-radius:6px;line-height:1.6}

        /* ---- 调试面板 ---- */
        #debug-panel{
            position:absolute;top:16px;left:50%;transform:translateX(-50%);
            pointer-events:auto;color:#0f0;font-family:'Consolas',monospace;
            font-size:12px;background:rgba(0,0,0,.75);padding:12px 16px;
            border-radius:8px;border:1px solid rgba(0,255,0,.3);
            min-width:320px;z-index:40;display:none;
            backdrop-filter:blur(4px);
        }
        #debug-panel.visible{display:block}
        #debug-panel h3{color:#0f0;font-size:13px;margin:0 0 8px 0;border-bottom:1px solid rgba(0,255,0,.2);padding-bottom:4px}
        #debug-panel .row{display:flex;justify-content:space-between;margin:2px 0;line-height:1.6}
        #debug-panel .lbl{color:#888}
        #debug-panel .val{color:#0f0;font-weight:bold;text-align:right}
        #debug-panel .val.warn{color:#fa0}
        #debug-panel .val.err{color:#f44}
        #debug-panel .section{margin-top:8px;border-top:1px solid rgba(0,255,0,.15);padding-top:6px}
        #debug-panel .section h4{color:#0ff;font-size:11px;margin:0 0 4px 0}
        #debug-panel input[type=range]{
            width:100%;height:4px;-webkit-appearance:none;appearance:none;
            background:rgba(255,255,255,.15);border-radius:2px;outline:none;margin:4px 0;
        }
        #debug-panel input[type=range]::-webkit-slider-thumb{
            -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
            background:#0f0;cursor:pointer;border:none;
        }
        #debug-panel input[type=range]::-moz-range-thumb{
            width:14px;height:14px;border-radius:50%;background:#0f0;cursor:pointer;border:none;
        }
        #debug-panel .slider-row{display:flex;align-items:center;gap:8px;margin:3px 0}
        #debug-panel .slider-lbl{color:#aaa;font-size:11px;min-width:80px}
        #debug-panel .slider-val{color:#0f0;font-size:11px;min-width:50px;text-align:right}
        #debug-toggle-hint{position:absolute;top:4px;right:8px;color:#555;font-size:10px;pointer-events:none}

        /* ---- 碰撞闪屏 ---- */
        #cflash{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,0,0,0);pointer-events:none;z-index:5;transition:background .05s}
        #cflash.on{background:rgba(255,0,0,.15)}

        /* ---- 移动端控件 ---- */
        #touch-zone{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:20;pointer-events:none}
        .touch-panel{position:absolute;pointer-events:auto;bottom:20px}
        .touch-panel-left{left:10px;width:150px;height:200px}
        .touch-panel-right{right:10px;width:80px;height:220px;display:flex;flex-direction:column;gap:10px}
        .touch-btn{flex:1;border-radius:12px;border:2px solid rgba(255,255,255,.3);background:rgba(0,0,0,.5);color:#fff;font-size:14px;font-weight:bold;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;touch-action:none}
        .touch-btn:active,.touch-btn.active{background:rgba(255,255,255,.15);border-color:#fff}
        .touch-btn.gas{border-color:rgba(0,200,0,.6);color:#0c0}
        .touch-btn.gas.active{background:rgba(0,200,0,.25)}
        .touch-btn.brk{border-color:rgba(200,0,0,.6);color:#f44}
        .touch-btn.brk.active{background:rgba(200,0,0,.25)}
        .touch-btn.rst{border-color:rgba(0,150,255,.5);color:#0af;font-size:12px}

        /* ---- 方向盘 Canvas ---- */
        #sw-canvas{display:block;margin:0 auto;border-radius:50%;touch-action:none}

        @media(pointer:coarse),(max-width:900px){
            #touch-zone{display:block}
            #hud-bottom{display:none}
            #diag{display:none}
        }
    </style>
</head>
<body>

<!-- 左上 HUD：速度 + 档位 -->
<div id="hud-left">
    <div><span class="speed" id="hud-speed">0</span> <span style="font-size:12px">km/h</span></div>
    <div>档位：<span class="gear gear-d" id="hud-gear">D</span></div>
    <div style="font-size:11px;color:#888;margin-top:4px">按 R 重置</div>
</div>

<!-- 右上 HUD：关卡/得分/时间 -->
<div id="hud-right">
    <div class="level">关卡 <span id="hud-level">1</span></div>
    <div class="score">得分：<span id="hud-score">0</span></div>
    <div class="timer">用时：<span id="hud-time">0.0</span>s</div>
    <div style="margin-top:4px;font-size:11px;color:#888">目标：倒入 A区-<span id="hud-spot">03</span></div>
</div>

<!-- 底部操作提示 -->
<div id="hud-bottom">W/S 油门/刹车 &nbsp;|&nbsp; A/D 转向 &nbsp;|&nbsp; 空格 手刹 &nbsp;|&nbsp; R 重置 &nbsp;|&nbsp; PageUp/Down 视距</div>

<!-- 停车判定弹窗 -->
<div id="park-status"></div>

<!-- 碰撞闪屏 -->
<div id="cflash"></div>

<!-- 诊断信息 -->
<div id="diag">loading...</div>

<!-- 调试面板 -->
<div id="debug-panel">
    <span id="debug-toggle-hint">F3 切换</span>
    <h3>&#x1F527; 调试面板</h3>
    <div class="section">
        <div class="row"><span class="lbl">坐标 X</span><span class="val" id="dbg-x">0.00</span></div>
        <div class="row"><span class="lbl">坐标 Y</span><span class="val" id="dbg-y">0.00</span></div>
        <div class="row"><span class="lbl">坐标 Z</span><span class="val" id="dbg-z">0.00</span></div>
        <div class="row"><span class="lbl">水平速度</span><span class="val" id="dbg-spd">0.0 km/h</span></div>
        <div class="row"><span class="lbl">方向盘角度</span><span class="val" id="dbg-sw">0.0 deg</span></div>
        <div class="row"><span class="lbl">前轮转向角</span><span class="val" id="dbg-st">0.00 rad</span></div>
        <div class="row"><span class="lbl">引擎力</span><span class="val" id="dbg-eng">0 N</span></div>
        <div class="row"><span class="lbl">档位</span><span class="val" id="dbg-gear">D</span></div>
    </div>
    <div class="section">
        <h4>&#x2699; 物理参数调节</h4>
        <div class="slider-row">
            <span class="slider-lbl">转向灵敏度</span>
            <input type="range" id="sl-steer" min="0.1" max="2.0" step="0.05" value="1.0">
            <span class="slider-val" id="sl-steer-v">1.00</span>
        </div>
        <div class="slider-row">
            <span class="slider-lbl">引擎加速度</span>
            <input type="range" id="sl-eng" min="100" max="1500" step="10" value="600">
            <span class="slider-val" id="sl-eng-v">600</span>
        </div>
        <div class="slider-row">
            <span class="slider-lbl">刹车力度</span>
            <input type="range" id="sl-brk" min="5" max="150" step="5" value="50">
            <span class="slider-val" id="sl-brk-v">50</span>
        </div>
        <div class="slider-row">
            <span class="slider-lbl">最大转向角</span>
            <input type="range" id="sl-msa" min="0.2" max="1.2" step="0.05" value="0.6">
            <span class="slider-val" id="sl-msa-v">0.60</span>
        </div>
        <div class="slider-row">
            <span class="slider-lbl">悬挂刚度</span>
            <input type="range" id="sl-stiff" min="5" max="80" step="1" value="30">
            <span class="slider-val" id="sl-stiff-v">30</span>
        </div>
        <div class="slider-row">
            <span class="slider-lbl">悬挂阻尼</span>
            <input type="range" id="sl-damp" min="0.5" max="6" step="0.1" value="2.3">
            <span class="slider-val" id="sl-damp-v">2.3</span>
        </div>
        <div class="slider-row">
            <span class="slider-lbl">轮胎摩擦</span>
            <input type="range" id="sl-fric" min="0.1" max="1.5" step="0.05" value="0.5">
            <span class="slider-val" id="sl-fric-v">0.50</span>
        </div>
    </div>
</div>

<!-- 移动端触控区域 -->
<div id="touch-zone">
    <div class="touch-panel touch-panel-left">
        <canvas id="sw-canvas" width="150" height="150"></canvas>
    </div>
    <div class="touch-panel touch-panel-right">
        <div class="touch-btn gas" id="t-gas">W</div>
        <div class="touch-btn brk" id="t-brk">S</div>
        <div class="touch-btn rst" id="t-reset">R</div>
    </div>
</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.164.1/build/three.module.js","three/addons/":"https://unpkg.com/three@0.164.1/examples/jsm/","cannon-es":"https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"}}
</script>
<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';
// =========================================================
// 一、Three.js 场景/相机/渲染器
// =========================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 80, 250);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// =========================================================
// 二、灯光
// =========================================================
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(25, 35, 15);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
const sc = sun.shadow.camera;
sc.near = 0.5; sc.far = 120; sc.left = -50; sc.right = 50; sc.top = 50; sc.bottom = -50;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x87CEEB, 0x362A28, 0.35));

// =========================================================
// 三、Cannon-es 物理世界
// =========================================================
const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0), allowSleep: true });
const defMat = new CANNON.Material('def');
world.defaultContactMaterial = new CANNON.ContactMaterial(defMat, defMat, {
    friction: 0.3, restitution: 0.2, contactEquationStiffness: 1e8, contactEquationRelaxation: 3
});
const gndMat = new CANNON.Material('gnd');
const whlMat = new CANNON.Material('whl');
const wheelGroundContact = new CANNON.ContactMaterial(whlMat, gndMat, {
    friction: 0.5, restitution: 0.0, contactEquationStiffness: 1e8, contactEquationRelaxation: 3
});
world.addContactMaterial(wheelGroundContact);
const wallMat = new CANNON.Material('wall');
world.addContactMaterial(new CANNON.ContactMaterial(wallMat, defMat, {
    friction: 0.2, restitution: 0.4, contactEquationStiffness: 1e8, contactEquationRelaxation: 3
}));

// =========================================================
// 四、地面
// =========================================================
const gndBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane(), material: gndMat });
gndBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
world.addBody(gndBody);

const gndMesh = new THREE.Mesh(new THREE.PlaneGeometry(250, 250),
    new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.9 }));
gndMesh.rotation.x = -Math.PI / 2; gndMesh.receiveShadow = true;
scene.add(gndMesh);
const grid = new THREE.GridHelper(250, 125, 0x888888, 0x666666);
grid.position.y = 0.01; scene.add(grid);

// =========================================================
// 五、场景环境（建筑/路桩/标线）
// =========================================================
function addBuildings() {
    const cfg = [
        { x:-40, z:0,  w:14, h:12, d:14, c:0x8899AA },
        { x:40,  z:0,  w:12, h:8,  d:18, c:0x998877 },
        { x:0,   z:-35, w:70, h:10, d:8,  c:0x778899 },
        { x:0,   z:35,  w:70, h:14, d:8,  c:0x889988 },
    ];
    cfg.forEach(({ x, z, w, h, d, c }) => {
        const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d),
            new THREE.MeshStandardMaterial({ color: c, roughness: 0.8 }));
        m.position.set(x, h/2, z); m.castShadow = true; m.receiveShadow = true; scene.add(m);
        world.addBody(new CANNON.Body({ mass: 0,
            shape: new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)),
            position: new CANNON.Vec3(x, h/2, z) }));
    });
}
addBuildings();

function addBollards() {
    const m = new THREE.MeshStandardMaterial({ color: 0xBB2222, roughness: 0.6 });
    [[-28,-16],[-28,-12],[-28,12],[-28,16],[28,-16],[28,-12],[28,12],[28,16]].forEach(([x,z]) => {
        const ms = new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.25,1.2,8), m);
        ms.position.set(x,0.6,z); ms.castShadow=true; scene.add(ms);
        world.addBody(new CANNON.Body({ mass:0, shape:new CANNON.Cylinder(0.2,0.25,1.2,8),
            position: new CANNON.Vec3(x,0.6,z) }));
    });
}
addBollards();

// =========================================================
// 六、车位系统（多个关卡车位）
// =========================================================
const SPOTS = [
    { cx:22, cz:20,  w:3.6, d:5.6, label:'A-03', angle:0 },
    { cx:-18, cz:18, w:3.6, d:5.6, label:'B-07', angle:0 },
    { cx:22, cz:-16, w:3.6, d:5.6, label:'C-12', angle:Math.PI },
];

// 车库墙壁物理体列表
let spotBodies = [];

function clearSpotBodies() {
    spotBodies.forEach(b => world.removeBody(b));
    spotBodies = [];
}

function buildSpotVisual(spot, highlight) {
    const { cx, cz, w, d } = spot;
    const hW = w/2, hD = d/2;
    const lineColor = highlight ? 0x00ff44 : 0xffffff;
    const groundColor = highlight ? 0x335533 : 0x444444;

    const lm = new THREE.MeshStandardMaterial({ color: lineColor, emissive: new THREE.Color(lineColor).multiplyScalar(0.2) });
    const lines = [
        { x: cx-hW, z: cz, bw:0.12, bd:d },
        { x: cx+hW, z: cz, bw:0.12, bd:d },
        { x: cx,    z: cz+hD, bw:w+0.24, bd:0.12 },
    ];
    const g = new THREE.Group();
    lines.forEach(({ x, z, bw, bd }) => {
        const ms = new THREE.Mesh(new THREE.BoxGeometry(bw, 0.02, bd), lm);
        ms.position.set(x, 0.025, z); g.add(ms);
    });
    const sg = new THREE.Mesh(new THREE.PlaneGeometry(w-0.05, d-0.05),
        new THREE.MeshStandardMaterial({ color: groundColor, roughness: 0.8 }));
    sg.rotation.x = -Math.PI/2; sg.position.set(cx, 0.018, cz); g.add(sg);
    scene.add(g);

    // 三面物理墙壁
    const wallH = 1.5, wallT = 0.15;
    const defs = [
        { x: cx-hW-wallT/2, z: cz, he: new CANNON.Vec3(wallT/2, wallH/2, d/2+wallT) },
        { x: cx+hW+wallT/2, z: cz, he: new CANNON.Vec3(wallT/2, wallH/2, d/2+wallT) },
        { x: cx, z: cz+hD+wallT/2, he: new CANNON.Vec3(w/2+wallT, wallH/2, wallT/2) },
    ];
    defs.forEach(({ x, z, he }) => {
        const b = new CANNON.Body({ mass:0, material:wallMat, shape:new CANNON.Box(he),
            position: new CANNON.Vec3(x, wallH/2, z) });
        b.userData = { type:'parking_wall' };
        world.addBody(b); spotBodies.push(b);
        const vm = new THREE.Mesh(new THREE.BoxGeometry(he.x*2, he.y*2, he.z*2),
            new THREE.MeshStandardMaterial({ color: highlight?0x44aa66:0x88aacc, transparent:true, opacity:0.3 }));
        vm.position.set(x, wallH/2, z); vm.castShadow=true; g.add(vm);
    });
    return g;
}

let spotVisualGroup = null;
let currentSpotIdx = 0;
function loadSpot(idx) {
    if (spotVisualGroup) { scene.remove(spotVisualGroup); }
    clearSpotBodies();
    currentSpotIdx = idx % SPOTS.length;
    const spot = SPOTS[currentSpotIdx];
    spotVisualGroup = buildSpotVisual(spot, true);
}
loadSpot(0);

// =========================================================
// 七、车辆物理
// =========================================================
const VC = {
    wR: 0.3, sStiff: 30, sRest: 0.2, dRelax: 2.3, dComp: 4.4,
    maxSF: 100000, maxST: 0.2, rollI: 0.01, maxSteer: 0.6,
    engineF: 600, brakeF: 50, mass: 150,
};

const SPWN = { x:22, z:6 };
const chassisBody = new CANNON.Body({
    mass: VC.mass, shape: new CANNON.Box(new CANNON.Vec3(1, 0.35, 2)),
    position: new CANNON.Vec3(SPWN.x, VC.wR + VC.sRest + 0.35, SPWN.z),
});
world.addBody(chassisBody);

const veh = new CANNON.RaycastVehicle({ chassisBody, indexRightAxis:0, indexUpAxis:1, indexForwardAxis:2 });
const wP = [new CANNON.Vec3(-1,0,1.4), new CANNON.Vec3(1,0,1.4), new CANNON.Vec3(-1,0,-1.4), new CANNON.Vec3(1,0,-1.4)];
const sI = [0,1], dI = [2,3];
wP.forEach(p => veh.addWheel({
    radius: VC.wR, directionLocal: new CANNON.Vec3(0,-1,0),
    suspensionStiffness: VC.sStiff, suspensionRestLength: VC.sRest,
    maxSuspensionTravel: VC.maxST, dampingRelaxation: VC.dRelax,
    dampingCompression: VC.dComp, maxSuspensionForce: VC.maxSF,
    rollInfluence: VC.rollI, axleLocal: new CANNON.Vec3(-1,0,0),
    chassisConnectionPointLocal: p, customSlidingRotationalSpeed: -30,
    useCustomSlidingRotationalSpeed: true,
}));
veh.addToWorld(world);

// =========================================================
// 八、Three.js 汽车模型
// =========================================================
const carG = new THREE.Group();
const bMat = new THREE.MeshStandardMaterial({ color:0x1a5276, roughness:0.3, metalness:0.6 });
const body = new THREE.Mesh(new THREE.BoxGeometry(2,0.7,4), bMat);
body.castShadow=true; carG.add(body);
const cab = new THREE.Mesh(new THREE.BoxGeometry(1.8,0.6,2.2),
    new THREE.MeshStandardMaterial({ color:0x2980b9, roughness:0.2, metalness:0.7 }));
cab.position.set(0,0.65,-0.3); cab.castShadow=true; carG.add(cab);

const gMat = new THREE.MeshStandardMaterial({ color:0xaaddff, transparent:true, opacity:0.5, roughness:0.1, metalness:0.8 });
const wG = new THREE.BoxGeometry(1.6,0.5,0.05);
const fG = new THREE.Mesh(wG, gMat); fG.position.set(0,0.7,0.75); fG.rotation.x=0.3; carG.add(fG);
const rG = new THREE.Mesh(wG, gMat); rG.position.set(0,0.7,-1.4); rG.rotation.x=-0.3; carG.add(rG);

const hlMat = new THREE.MeshStandardMaterial({ color:0xffffaa, emissive:0xffff00, emissiveIntensity:0.5 });
const tlMat = new THREE.MeshStandardMaterial({ color:0xff0000, emissive:0xff0000, emissiveIntensity:0.3 });
[-0.7,0.7].forEach(x => {
    carG.add(Object.assign(new THREE.Mesh(new THREE.SphereGeometry(0.12,8,8),hlMat),{position:new THREE.Vector3(x,0.1,2.01)}));
    carG.add(Object.assign(new THREE.Mesh(new THREE.SphereGeometry(0.12,8,8),tlMat),{position:new THREE.Vector3(x,0.1,-2.01)}));
});
scene.add(carG);

const whMeshes = [];

let levelTime = 0;

const hudGear = document.getElementById('hud-gear');
const hudScore = document.getElementById('hud-score');

function updateGearUI() {
    hudGear.textContent = gear;
    hudGear.className = gear === 'D' ? 'gear gear-d' : 'gear gear-r';
}

function showStatus(text, cls, duration) {
    parkStatus.textContent = text;
    parkStatus.className = cls;
    statusTimer = duration;
}

function resetCar() {
    const spot = SPOTS[currentSpotIdx];
    chassisBody.position.set(spot.cx, VC.wR + VC.sRest + 0.35, spot.cz - 14);
    chassisBody.quaternion.set(0,0,0,1);
    chassisBody.velocity.set(0,0,0);
    chassisBody.angularVelocity.set(0,0,0);
    for(let i=0;i<4;i++){ veh.setBrake(0,i); veh.applyEngineForce(0,i); veh.setSteeringValue(0,i); }
    gear='D'; updateGearUI();
    parkingDone=false; levelTime=0;
    showStatus('关卡 '+(currentSpotIdx+1)+'：倒入 '+spot.label, 'info', 2.5);
}

function nextLevel() {
    score += Math.max(100 - Math.round(levelTime * 5), 10);
    hudScore.textContent = score;
    loadSpot(currentSpotIdx + 1);
    setTimeout(resetCar, 100);
}

const keys = new Set();
let isBraking = false, wantReset = false;
let touchGas = false, touchBrk = false;

window.addEventListener('keydown', e => {
    keys.add(e.key.toLowerCase());
    if(e.key===' '){ isBraking=true; e.preventDefault(); }
    if(e.key.toLowerCase()==='r' && !e.repeat){
        const v=chassisBody.velocity;
        if(Math.sqrt(v.x*v.x+v.z*v.z)<0.5) wantReset=true;
    }
});
window.addEventListener('keyup', e => {
    keys.delete(e.key.toLowerCase());

});

// 移动端触控按钮
const isMobile = matchMedia('(pointer:coarse)').matches || innerWidth < 900;
if(isMobile){
    const tGas = document.getElementById('t-gas');
    const tBrk = document.getElementById('t-brk');
    const tRst = document.getElementById('t-reset');
    const bind = (el, flag, val) => {
        el.addEventListener('touchstart', e=>{ e.preventDefault(); window[flag]=val; el.classList.add('active'); },{passive:false});
        el.addEventListener('touchend', ()=>{ window[flag]=false; el.classList.remove('active'); });
    };
    bind(tGas, 'touchGas', true);
    bind(tBrk, 'touchBrk', true);
    tRst.addEventListener('touchstart', e=>{ e.preventDefault(); wantReset=true; },{passive:false});
}

// =========================================================
// 十一、方向盘
// =========================================================
class SteeringWheel {
    constructor(canvasId, maxA) {
        this.cv = document.getElementById(canvasId);
        this.ctx = this.cv.getContext('2d');
        this.sz = this.cv.width; this.cx = this.sz/2; this.cy = this.sz/2;
        this.R = this.sz/2 - 6; this.iR = this.R * 0.55; this.gw = 12;
        this.ang = 0; this.maxA = maxA || 270;
        this.drag=false; this.da0=0; this.dr0=0;
        this.spring=false; this.sv=0;
        this._bind();
    }
    _bind(){
        const c=this.cv;
        const dn=e=>this._down(e), mv=e=>this._move(e), up=()=>this._up();
        c.addEventListener('mousedown',dn); window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
        c.addEventListener('touchstart',e=>{e.preventDefault();this._down(e.touches[0]);},{passive:false});
        window.addEventListener('touchmove',e=>{if(this.drag)this._move(e.touches[0]);},{passive:false});
        window.addEventListener('touchend',up);
    }
    _a(e){const r=this.cv.getBoundingClientRect();return Math.atan2(e.clientY-r.top-this.cy,e.clientX-r.left-this.cx)*180/Math.PI;}
    _down(e){
        const r=this.cv.getBoundingClientRect(),dx=e.clientX-r.left-this.cx,dy=e.clientY-r.top-this.cy;
        if(Math.sqrt(dx*dx+dy*dy)>this.R+30)return;
        this.drag=true;this.spring=false;this.sv=0;this.da0=this._a(e);this.dr0=this.ang;
    }
    _move(e){if(!this.drag)return;let d=this._a(e)-this.da0;if(d>180)d-=360;if(d<-180)d+=360;
        this.ang=THREE.MathUtils.clamp(this.dr0+d,-this.maxA,this.maxA);}
    _up(){if(this.drag){this.drag=false;this.spring=true;}}
    update(dt){
        if(this.spring&&!this.drag){
            const f=-14*this.ang-7*this.sv; this.sv+=f*dt; this.ang+=this.sv*dt;
            if(Math.abs(this.ang)<0.3&&Math.abs(this.sv)<1){this.ang=0;this.sv=0;this.spring=false;}
        }
    }
    norm(){return this.ang/this.maxA;}
    draw(){
        const {ctx,cx,cx:cx2,cy,R,iR,gw}=this;
        ctx.clearRect(0,0,this.sz,this.sz);
        ctx.save();ctx.translate(cx,cy);
        const aS=Math.PI*0.75,aE=Math.PI*2.25;
        ctx.beginPath();ctx.arc(0,0,R+3,aS,aE);ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=5;ctx.stroke();
        const n=this.ang/this.maxA,mid=(aS+aE)/2;
        if(Math.abs(this.ang)>0.5){
            ctx.beginPath();ctx.arc(0,0,R+3,n<0?mid+n*(aE-aS)/2:mid,n<0?mid:mid+n*(aE-aS)/2);
            ctx.strokeStyle=n<0?'#f64':'#4f6';ctx.lineWidth=5;ctx.stroke();
        }
        ctx.save();ctx.rotate(this.ang*Math.PI/180);
        ctx.beginPath();ctx.arc(0,0,R,0,Math.PI*2);ctx.strokeStyle='#444';ctx.lineWidth=gw;ctx.stroke();
        ctx.lineWidth=7;ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(0,-R+gw/2);ctx.lineTo(0,-iR);ctx.strokeStyle='#555';ctx.stroke();
        const ba=240*Math.PI/180;
        ctx.beginPath();ctx.moveTo(Math.cos(ba)*(R-gw/2),Math.sin(ba)*(R-gw/2));ctx.lineTo(Math.cos(ba)*iR,Math.sin(ba)*iR);ctx.stroke();
        const bb=300*Math.PI/180;
        ctx.beginPath();ctx.moveTo(Math.cos(bb)*(R-gw/2),Math.sin(bb)*(R-gw/2));ctx.lineTo(Math.cos(bb)*iR,Math.sin(bb)*iR);ctx.stroke();
        const hg=ctx.createRadialGradient(0,0,0,0,0,iR*0.6);hg.addColorStop(0,'#777');hg.addColorStop(1,'#333');
        ctx.beginPath();ctx.arc(0,0,iR*0.5,0,Math.PI*2);ctx.fillStyle=hg;ctx.fill();
        ctx.beginPath();ctx.moveTo(0,-R+gw+3);ctx.lineTo(-5,-R+gw+13);ctx.lineTo(5,-R+gw+13);ctx.closePath();ctx.fillStyle='#f33';ctx.fill();
        ctx.restore();ctx.restore();
    }
}
const sw = isMobile ? new SteeringWheel('sw-canvas', 270) : null;

// 十二、调试面板
// =========================================================
let debugVisible = false;
const debugPanel = document.getElementById('debug-panel');
const dbgEls = {
    x: document.getElementById('dbg-x'),
    y: document.getElementById('dbg-y'),
    z: document.getElementById('dbg-z'),
    spd: document.getElementById('dbg-spd'),
    sw: document.getElementById('dbg-sw'),
    st: document.getElementById('dbg-st'),
    eng: document.getElementById('dbg-eng'),
    gear: document.getElementById('dbg-gear'),
};

// 物理参数滑块（实时生效）
const sliders = {
    steer:  { el: document.getElementById('sl-steer'),  vEl: document.getElementById('sl-steer-v'),  def: 1.0 },
    eng:    { el: document.getElementById('sl-eng'),    vEl: document.getElementById('sl-eng-v'),    def: 600 },
    brk:    { el: document.getElementById('sl-brk'),    vEl: document.getElementById('sl-brk-v'),    def: 50 },
    msa:    { el: document.getElementById('sl-msa'),    vEl: document.getElementById('sl-msa-v'),    def: 0.6 },
    stiff:  { el: document.getElementById('sl-stiff'),  vEl: document.getElementById('sl-stiff-v'),  def: 30 },
    damp:   { el: document.getElementById('sl-damp'),   vEl: document.getElementById('sl-damp-v'),   def: 2.3 },
    fric:   { el: document.getElementById('sl-fric'),   vEl: document.getElementById('sl-fric-v'),   def: 0.5 },
};

// 获取可调节参数（每帧覆盖 VC 字段）
function getTuning() {
    return {
        steerMul:  parseFloat(sliders.steer.el.value),
        engineF:   parseFloat(sliders.eng.el.value),
        brakeF:    parseFloat(sliders.brk.el.value),
        maxSteer:  parseFloat(sliders.msa.el.value),
        stiff:     parseFloat(sliders.stiff.el.value),
        damp:      parseFloat(sliders.damp.el.value),
        friction:  parseFloat(sliders.fric.el.value),
    };
}

// 更新滑块显示值 + 实时应用悬挂参数
Object.values(sliders).forEach(s => {
    if (!s.el || !s.vEl) return;
    s.vEl.textContent = s.el.value;
    s.el.addEventListener('input', () => {
        s.vEl.textContent = parseFloat(s.el.value).toFixed(s.el.step.includes('.') ? 2 : 0);
        applySuspensionParams();
    });
});

// 实时将滑块值写入已创建的车轮悬挂参数
function applySuspensionParams() {
    const t = getTuning();
    veh.wheelInfos.forEach(w => {
        w.suspensionStiffness = t.stiff;
        w.dampingRelaxation = t.damp;
    });
    // 更新轮胎摩擦材质
    wheelGroundContact.friction = t.friction;
}

function updateDebugPanel(steerN, steerV, engF) {
    if (!debugVisible) return;
    const p = chassisBody.position;
    const vel = chassisBody.velocity;
    const spd = Math.sqrt(vel.x * vel.x + vel.z * vel.z);
    dbgEls.x.textContent = p.x.toFixed(3);
    dbgEls.y.textContent = p.y.toFixed(3);
    dbgEls.z.textContent = p.z.toFixed(3);
    dbgEls.spd.textContent = (spd * 3.6).toFixed(1) + ' km/h';
    dbgEls.spd.className = spd * 3.6 > 40 ? 'val warn' : 'val';
    dbgEls.sw.textContent = (sw ? sw.ang : 0).toFixed(1) + ' deg';
    dbgEls.st.textContent = steerV.toFixed(3) + ' rad';
    dbgEls.eng.textContent = engF.toFixed(0) + ' N';
    dbgEls.eng.className = engF > 0 ? 'val' : engF < 0 ? 'val err' : 'val';
    dbgEls.gear.textContent = gear;
}

window.addEventListener('keydown', e => {

// 十三、碰撞检测

});

// =========================================================
// 十三、入库判定
// =========================================================
function checkParking() {
    if(parkingDone) return;
    const spot = SPOTS[currentSpotIdx];
    const px = chassisBody.position.x, pz = chassisBody.position.z;
    const hW = spot.w/2 - 0.3, hD = spot.d/2 - 0.3;
    const inX = px > spot.cx - hW && px < spot.cx + hW;
    const inZ = pz > spot.cz - hD && pz < spot.cz + hD;

    const eq = new THREE.Quaternion(chassisBody.quaternion.x, chassisBody.quaternion.y, chassisBody.quaternion.z, chassisBody.quaternion.w);
    let yaw = THREE.MathUtils.radToDeg(new THREE.Euler().setFromQuaternion(eq, 'YXZ').y);
    while(yaw>180) yaw-=360; while(yaw<-180) yaw+=360;

    const target = THREE.MathUtils.radToDeg(spot.angle);
    let diff = Math.abs(yaw - target);
    if(diff > 180) diff = 360 - diff;
    const aligned = diff < 15;

    if(inX && inZ && aligned) {
        parkingDone = true;
        showStatus('\u2705 入库成功！+' + Math.max(100-Math.round(levelTime*5),10) + '分', 'ok', 3);
        setTimeout(nextLevel, 3200);
    }
}

const cam = {
    dist: 14, minD: 5, maxD: 28, h: 6,
    curPos: new THREE.Vector3(SPWN.x, 8, SPWN.z - 20),
    curLook: new THREE.Vector3(SPWN.x, 1, SPWN.z),
};

addEventListener('resize', () => {

// =========================================================
// 十六、悬挂辅助
// =========================================================
const sH = [];
for(let i=0;i<4;i++){
    const h=new THREE.Mesh(new THREE.CylinderGeometry(0.015,0.015,1,4),new THREE.MeshBasicMaterial({color:0xff0000}));
    scene.add(h); sH.push(h);
}

// =========================================================
// 十七、主循环
// =========================================================
const clock = new THREE.Clock();
resetCar();

function animate(){
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);

    // 方向盘
    if(sw) { sw.update(dt); sw.draw(); }

    // 重置
    if(wantReset){ wantReset=false; resetCar(); }

    // 转向
    const tuning = getTuning();
    let steerN = sw ? sw.norm() : 0;
    if(keys.has('a')) steerN = 1;
    if(keys.has('d')) steerN = -1;
    steerN = THREE.MathUtils.clamp(steerN * tuning.steerMul, -1, 1);
    const steerV = steerN * tuning.maxSteer;

    // 油门/刹车
    let engF = 0;
    const gForward = (keys.has('w') || touchGas);
    const gBrake = (keys.has('s') || touchBrk);
    if(gForward) engF = gear==='D' ? tuning.engineF : -tuning.engineF*0.5;
    if(gBrake) engF = gear==='D' ? -tuning.engineF*0.5 : tuning.engineF;

    dI.forEach(i => veh.applyEngineForce(engF, i));
    sI.forEach(i => veh.setSteeringValue(steerV, i));
    for(let i=0;i<4;i++) veh.setBrake(isBraking ? tuning.brakeF : 0, i);

    // 物理
    world.step(1/60, dt, 3);

    // 同步视觉
    carG.position.copy(chassisBody.position);
    carG.quaternion.copy(chassisBody.quaternion);
    for(let i=0;i<4;i++){
        const t=veh.wheelInfos[i].worldTransform;
        whMeshes[i].position.set(t.position.x,t.position.y,t.position.z);
        whMeshes[i].quaternion.set(t.quaternion.x,t.quaternion.y,t.quaternion.z,t.quaternion.w);
        const info=veh.wheelInfos[i];
        const lc=new THREE.Vector3().copy(info.chassisConnectionPointLocal);
        lc.applyQuaternion(new THREE.Quaternion(chassisBody.quaternion.x,chassisBody.quaternion.y,chassisBody.quaternion.z,chassisBody.quaternion.w));
        const wc=new THREE.Vector3().copy(chassisBody.position).add(lc);
        sH[i].position.copy(wc).lerp(whMeshes[i].position,0.5);
        sH[i].lookAt(whMeshes[i].position); sH[i].rotateX(Math.PI/2);
        sH[i].scale.y=Math.max(wc.distanceTo(whMeshes[i].position),0.01);
    }

    // 碰撞反馈
    if(collisionTimer>0){
        collisionTimer-=dt;
        cflash.classList.add('on');
        if(collisionTimer<=0) cflash.classList.remove('on');
    }

    // 停车状态弹窗计时
    if(statusTimer>0){ statusTimer-=dt; if(statusTimer<=0) parkStatus.className=''; }

    // 入库判定
    if(!parkingDone) checkParking();
    if(!parkingDone) levelTime += dt;

    // 相机
    const bP=chassisBody.position, bQ=chassisBody.quaternion;
    const iOff=new THREE.Vector3(0, cam.h, -cam.dist);
    iOff.applyQuaternion(new THREE.Quaternion(bQ.x,bQ.y,bQ.z,bQ.w));
    iOff.add(new THREE.Vector3(bP.x,bP.y,bP.z));
    const iLA=new THREE.Vector3(bP.x, bP.y+1.5, bP.z);
    cam.curPos.lerp(iOff, 0.06);
    cam.curLook.lerp(iLA, 0.08);
    camera.position.copy(cam.curPos);
    camera.lookAt(cam.curLook);

    // 相机视距
    if(keys.has('pageup')) cam.dist=THREE.MathUtils.clamp(cam.dist-5*dt,cam.minD,cam.maxD);
    if(keys.has('pagedown')) cam.dist=THREE.MathUtils.clamp(cam.dist+5*dt,cam.minD,cam.maxD);

    // HUD
    const vel=chassisBody.velocity;
    const spd=Math.sqrt(vel.x*vel.x+vel.z*vel.z);
    document.getElementById('hud-speed').textContent = Math.round(spd*3.6);
    document.getElementById('hud-time').textContent = levelTime.toFixed(1);

    // 诊断
    const pp=chassisBody.position;
    document.getElementById('diag').textContent=
        `pos: ${pp.x.toFixed(1)}, ${pp.z.toFixed(1)} | gear: ${gear} | steer: ${steerN.toFixed(2)}`;

    // 调试面板
    updateDebugPanel(steerN, steerV, engF);

    renderer.render(scene, camera);
}
animate();
</script>
