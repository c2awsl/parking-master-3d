<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js + Cannon-es 物理停车场模拟器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; }
        canvas { display: block; }
        #hud {
            position: absolute; top: 16px; left: 16px;
            color: #fff; font-family: 'Consolas', monospace;
            font-size: 14px; line-height: 1.6;
            background: rgba(0,0,0,0.6); padding: 10px 14px;
            border-radius: 6px; pointer-events: none;
        }
        #speed {
            position: absolute; bottom: 16px; right: 16px;
            color: #0f0; font-family: 'Consolas', monospace;
            font-size: 20px; pointer-events: none;
            background: rgba(0,0,0,0.6); padding: 8px 16px;
            border-radius: 6px;
        }
        #physics-info {
            position: absolute; bottom: 16px; left: 16px;
            color: #ff0; font-family: 'Consolas', monospace;
            font-size: 12px; pointer-events: none;
            background: rgba(0,0,0,0.6); padding: 6px 10px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div id="hud">
    &#x1F697; 物理停车场模拟器 (Cannon-es)<br>
    W - 加速 &nbsp; S - 刹车/倒车<br>
    A - 左转 &nbsp; D - 右转<br>
    空格 - 手刹 &nbsp; PageUp/Down - 视距
</div>

<div id="speed">速度: 0 km/h</div>
<div id="physics-info">加载中...</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/",
        "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';

// =============================================
// 一、Three.js 场景、相机、渲染器
// =============================================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 80, 200);

const camera = new THREE.PerspectiveCamera(
    60, window.innerWidth / window.innerHeight, 0.1, 1000
);
camera.position.set(0, 8, 15);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// =============================================
// 二、灯光系统
// =============================================

const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(20, 30, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 100;
dirLight.shadow.camera.left = -40;
dirLight.shadow.camera.right = 40;
dirLight.shadow.camera.top = 40;
dirLight.shadow.camera.bottom = -40;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x362A28, 0.4);
scene.add(hemiLight);

// =============================================
// 三、Cannon-es 物理世界初始化
// =============================================

const world = new CANNON.World({
    gravity: new CANNON.Vec3(0, -9.82, 0),
    allowSleep: true,
});

// 默认碰撞参数
const defaultContactMaterial = new CANNON.ContactMaterial(
    new CANNON.Material('default'),
    new CANNON.Material('default'),
    {
        friction: 0.3,
        restitution: 0.2,
        contactEquationStiffness: 1e8,
        contactEquationRelaxation: 3,
    }
);
world.defaultContactMaterial = defaultContactMaterial;

// 地面材质
const groundMaterial = new CANNON.Material('ground');
// 轮胎材质
const wheelMaterial = new CANNON.Material('wheel');

// 轮胎与地面接触参数
const wheelGroundContact = new CANNON.ContactMaterial(
    wheelMaterial, groundMaterial,
    {
        friction: 0.45,
        restitution: 0.0,
        contactEquationStiffness: 1e8,
        contactEquationRelaxation: 3,
    }
);
world.addContactMaterial(wheelGroundContact);

// =============================================
// 四、物理地面刚体
// =============================================

const groundBody = new CANNON.Body({
    mass: 0,
    shape: new CANNON.Plane(),
    material: groundMaterial,
});
groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
world.addBody(groundBody);

// Three.js 地面
const groundGeo = new THREE.PlaneGeometry(200, 200);
const groundMat = new THREE.MeshStandardMaterial({
    color: 0x555555, roughness: 0.9, metalness: 0.0
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

const gridHelper = new THREE.GridHelper(200, 100, 0x888888, 0x666666);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// =============================================
// 五、停车场元素
// =============================================

// 停车位标线
function createParkingLines() {
    const group = new THREE.Group();
    const lineMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });

    for (let row = 0; row < 2; row++) {
        const zBase = row === 0 ? -8 : 8;
        const dir = row === 0 ? -1 : 1;
        for (let i = 0; i < 10; i++) {
            const x = -20 + i * 4;
            const left = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.02, 3.5), lineMat);
            left.position.set(x, 0.02, zBase + dir * 1.5);
            group.add(left);
            const right = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.02, 3.5), lineMat);
            right.position.set(x + 3.5, 0.02, zBase + dir * 1.5);
            group.add(right);
            const bottom = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.02, 0.15), lineMat);
            bottom.position.set(x + 1.75, 0.02, zBase);
            group.add(bottom);
        }
    }
    scene.add(group);
}
createParkingLines();

// 路桩（带碰撞体）
function createBollards() {
    const mat = new THREE.MeshStandardMaterial({ color: 0xCC0000, roughness: 0.6 });
    const positions = [
        [-25, -15], [-25, -11], [-25, 11], [-25, 15],
        [25, -15], [25, -11], [25, 11], [25, 15],
    ];
    positions.forEach(([x, z]) => {
        const mesh = new THREE.Mesh(
            new THREE.CylinderGeometry(0.2, 0.25, 1.2, 8), mat
        );
        mesh.position.set(x, 0.6, z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);

        const body = new CANNON.Body({
            mass: 0,
            shape: new CANNON.Cylinder(0.2, 0.25, 1.2, 8),
            position: new CANNON.Vec3(x, 0.6, z),
        });
        world.addBody(body);
    });
}
createBollards();

// 建筑物（带碰撞体）
function createBuildings() {
    const configs = [
        { x: -35, z: 0, w: 15, h: 12, d: 15, color: 0x8899AA },
        { x: 35, z: 0, w: 12, h: 8, d: 20, color: 0x998877 },
        { x: 0, z: -30, w: 60, h: 10, d: 8, color: 0x778899 },
        { x: 0, z: 30, w: 60, h: 14, d: 8, color: 0x889988 },
    ];

    configs.forEach(({ x, z, w, h, d, color }) => {
        const mesh = new THREE.Mesh(
            new THREE.BoxGeometry(w, h, d),
            new THREE.MeshStandardMaterial({ color, roughness: 0.8, metalness: 0.1 })
        );
        mesh.position.set(x, h / 2, z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);

        const body = new CANNON.Body({
            mass: 0,
            shape: new CANNON.Box(new CANNON.Vec3(w / 2, h / 2, d / 2)),
            position: new CANNON.Vec3(x, h / 2, z),
        });
        world.addBody(body);
    });
}
createBuildings();

// =============================================
// 六、Cannon-es RaycastVehicle 车辆
// =============================================

// 车辆配置参数
const VEHICLE_CFG = {
    wheelRadius: 0.3,            // 车轮半径
    suspensionStiffness: 30,     // 悬挂弹簧刚度
    suspensionRestLength: 0.2,   // 悬挂静止长度（行程）
    dampingRelaxation: 2.3,      // 回弹阻尼
    dampingCompression: 4.4,     // 压缩阻尼
    maxSuspensionForce: 100000,  // 悬挂最大力
    maxSuspensionTravel: 0.2,    // 悬挂最大行程
    rollInfluence: 0.01,         // 侧倾影响
    maxSteerAngle: 0.6,          // 最大转向角（弧度）
    engineForce: 600,            // 引擎力
    brakeForce: 50,              // 刹车力
};

// 创建车身刚体（Box 形状）
const chassisShape = new CANNON.Box(new CANNON.Vec3(1, 0.35, 2));
const chassisBody = new CANNON.Body({
    mass: 150,  // 车身质量 150kg
    shape: chassisShape,
    position: new CANNON.Vec3(0, VEHICLE_CFG.wheelRadius + VEHICLE_CFG.suspensionRestLength + 0.35, 0),
});
world.addBody(chassisBody);

// 创建 RaycastVehicle
const vehicle = new CANNON.RaycastVehicle({
    chassisBody: chassisBody,
    indexRightAxis: 0,      // x 轴为右侧
    indexUpAxis: 1,         // y 轴为上方
    indexForwardAxis: 2,    // z 轴为前方
});

// 定义四个车轮的连接点和属性
const wheelOptions = {
    radius: VEHICLE_CFG.wheelRadius,
    directionLocal: new CANNON.Vec3(0, -1, 0),      // 悬挂方向（向下）
    suspensionStiffness: VEHICLE_CFG.suspensionStiffness,
    suspensionRestLength: VEHICLE_CFG.suspensionRestLength,
    maxSuspensionTravel: VEHICLE_CFG.maxSuspensionTravel,
    dampingRelaxation: VEHICLE_CFG.dampingRelaxation,
    dampingCompression: VEHICLE_CFG.dampingCompression,
    maxSuspensionForce: VEHICLE_CFG.maxSuspensionForce,
    rollInfluence: VEHICLE_CFG.rollInfluence,
    axleLocal: new CANNON.Vec3(-1, 0, 0),           // 车轴方向（X轴）
    chassisConnectionPointLocal: new CANNON.Vec3(0, 0, 0), // 下面逐个设置
    customSlidingRotationalSpeed: -30,               // 车轮自然滑转速度
    useCustomSlidingRotationalSpeed: true,
};

// 四个车轮的连接点（相对于车身中心）
const wheelPositions = [
    new CANNON.Vec3(-1.0, 0, 1.4),    // 左前轮
    new CANNON.Vec3(1.0, 0, 1.4),     // 右前轮
    new CANNON.Vec3(-1.0, 0, -1.4),   // 左后轮
    new CANNON.Vec3(1.0, 0, -1.4),    // 右后轮
];

// 前两轮可转向，后两轮为驱动轮
const steerIndex = [0, 1];  // 前轮索引
const driveIndex = [2, 3];  // 后轮索引

wheelPositions.forEach((pos) => {
    const options = { ...wheelOptions };
    options.chassisConnectionPointLocal = pos;
    vehicle.addWheel(options);
});

// 将车辆添加到物理世界（每个车轮会创建一个 CANNON.RaycastVehicleWheelInfo）
vehicle.addToWorld(world);

// =============================================
// 七、Three.js 汽车视觉模型
// =============================================

const carGroup = new THREE.Group();

// 车身底盘
const bodyGeo = new THREE.BoxGeometry(2, 0.7, 4);
const bodyMat = new THREE.MeshStandardMaterial({
    color: 0x1a5276, roughness: 0.3, metalness: 0.6
});
const chassisMesh = new THREE.Mesh(bodyGeo, bodyMat);
chassisMesh.castShadow = true;
carGroup.add(chassisMesh);

// 车厢
const cabinGeo = new THREE.BoxGeometry(1.8, 0.6, 2.2);
const cabinMat = new THREE.MeshStandardMaterial({
    color: 0x2980b9, roughness: 0.2, metalness: 0.7
});
const cabinMesh = new THREE.Mesh(cabinGeo, cabinMat);
cabinMesh.position.set(0, 0.65, -0.3);
cabinMesh.castShadow = true;
carGroup.add(cabinMesh);

// 挡风玻璃
const glassMat = new THREE.MeshStandardMaterial({
    color: 0xaaddff, transparent: true, opacity: 0.5,
    roughness: 0.1, metalness: 0.8
});
const windshieldGeo = new THREE.BoxGeometry(1.6, 0.5, 0.05);

const frontGlass = new THREE.Mesh(windshieldGeo, glassMat);
frontGlass.position.set(0, 0.7, 0.75);
frontGlass.rotation.x = 0.3;
carGroup.add(frontGlass);

const rearGlass = new THREE.Mesh(windshieldGeo, glassMat);
rearGlass.position.set(0, 0.7, -1.4);
rearGlass.rotation.x = -0.3;
carGroup.add(rearGlass);

// 车灯
const headlightMat = new THREE.MeshStandardMaterial({
    color: 0xffffaa, emissive: 0xffff00, emissiveIntensity: 0.5
});
const taillightMat = new THREE.MeshStandardMaterial({
    color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.3
});
[-0.7, 0.7].forEach(x => {
    const hl = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), headlightMat);
    hl.position.set(x, 0.1, 2.01);
    carGroup.add(hl);

    const tl = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), taillightMat);
    tl.position.set(x, 0.1, -2.01);
    carGroup.add(tl);
});

scene.add(carGroup);

// 四个车轮的 Three.js 视觉模型
const wheelMeshes = [];
const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8, metalness: 0.3 });
const hubMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.3, metalness: 0.8 });

for (let i = 0; i < 4; i++) {
    const wheelGroup = new THREE.Group();

    // 轮胎（圆柱体）
    const tire = new THREE.Mesh(
        new THREE.CylinderGeometry(VEHICLE_CFG.wheelRadius, VEHICLE_CFG.wheelRadius, 0.25, 16),
        wheelMat
    );
    tire.rotation.z = Math.PI / 2;
    tire.castShadow = true;
    wheelGroup.add(tire);

    // 轮毂
    const hub = new THREE.Mesh(
        new THREE.CylinderGeometry(0.18, 0.18, 0.26, 6),
        hubMat
    );
    hub.rotation.z = Math.PI / 2;
    wheelGroup.add(hub);

    scene.add(wheelGroup);
    wheelMeshes.push(wheelGroup);
}

// =============================================
// 八、键盘输入管理
// =============================================

const keys = new Set();
let isBraking = false;

window.addEventListener('keydown', (e) => {
    keys.add(e.key.toLowerCase());
    if (e.key === ' ') isBraking = true;
});
window.addEventListener('keyup', (e) => {
    keys.delete(e.key.toLowerCase());
    if (e.key === ' ') isBraking = false;
});

// =============================================
// 九、第三人称相机
// =============================================

const camTarget = {
    distance: 12,
    minDistance: 5,
    maxDistance: 25,
    height: 5,
    currentPos: new THREE.Vector3(0, 8, 15),
    currentLookAt: new THREE.Vector3(),
};

// =============================================
// 十、窗口自适应
// =============================================

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// =============================================
// 十一、物理调试辅助体（可选，展示物理碰撞形状）
// =============================================

// 可视化悬挂射线（用细长圆柱表示每个车轮的悬挂方向）
const suspensionHelpers = [];
for (let i = 0; i < 4; i++) {
    const geo = new THREE.CylinderGeometry(0.02, 0.02, 1, 4);
    const mat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
    const helper = new THREE.Mesh(geo, mat);
    scene.add(helper);
    suspensionHelpers.push(helper);
}

// =============================================
// 十二、游戏主循环
// =============================================

const clock = new THREE.Clock();
let physSteps = 0;

function animate() {
    requestAnimationFrame(animate);

    const dt = Math.min(clock.getDelta(), 0.05);

    // ---- 键盘输入处理 ----

    let engineForce = 0;
    let steerValue = 0;

    // W — 加速前进
    if (keys.has('w')) {
        engineForce = VEHICLE_CFG.engineForce;
    }
    // S — 倒车/减速
    if (keys.has('s')) {
        engineForce = -VEHICLE_CFG.engineForce * 0.5;
    }
    // A — 左转
    if (keys.has('a')) {
        steerValue = VEHICLE_CFG.maxSteerAngle;
    }
    // D — 右转
    if (keys.has('d')) {
        steerValue = -VEHICLE_CFG.maxSteerAngle;
    }

    // 松开 A/D 时，转向角平滑回正（物理世界会自动归零，无需额外处理）

    // ---- 应用力到物理车轮 ----

    // 后轮为驱动轮，施加引擎力
    driveIndex.forEach(i => {
        vehicle.applyEngineForce(engineForce, i);
    });

    // 前轮为转向轮，施加转向角
    steerIndex.forEach(i => {
        vehicle.setSteeringValue(steerValue, i);
    });

    // 手刹：对所有车轮施加刹车力
    if (isBraking) {
        for (let i = 0; i < 4; i++) {
            vehicle.setBrake(VEHICLE_CFG.brakeForce, i);
        }
    } else {
        for (let i = 0; i < 4; i++) {
            vehicle.setBrake(0, i);
        }
    }

    // ---- 物理世界步进 ----
    // 固定时间步进，保证物理稳定性
    world.step(1 / 60, dt, 3);
    physSteps++;

    // ---- 同步 Three.js 视觉模型与物理刚体 ----

    // 车身同步：将物理车身的位置和旋转复制到 Three.js 车身
    carGroup.position.copy(chassisBody.position);
    carGroup.quaternion.copy(chassisBody.quaternion);

    // 四个车轮同步
    for (let i = 0; i < 4; i++) {
        const wheelInfo = vehicle.wheelInfos[i];

        // 从物理世界获取车轮的世界变换矩阵
        const t = wheelInfo.worldTransform;

        // 车轮视觉模型位置 = 物理世界计算的位置
        wheelMeshes[i].position.set(t.position.x, t.position.y, t.position.z);
        // 车轮视觉模型旋转 = 物理世界计算的旋转
        wheelMeshes[i].quaternion.set(
            t.quaternion.x, t.quaternion.y,
            t.quaternion.z, t.quaternion.w
        );

        // 更新悬挂辅助线（从连接点到车轮中心的红线）
        const connPoint = new THREE.Vector3(
            chassisBody.position.x + wheelInfo.chassisConnectionPointLocal.x,
            chassisBody.position.y + wheelInfo.chassisConnectionPointLocal.y,
            chassisBody.position.z + wheelInfo.chassisConnectionPointLocal.z,
        );
        // 将连接点变换到车身世界空间
        const localConn = new THREE.Vector3().copy(wheelInfo.chassisConnectionPointLocal);
        localConn.applyQuaternion(new THREE.Quaternion(
            chassisBody.quaternion.x, chassisBody.quaternion.y,
            chassisBody.quaternion.z, chassisBody.quaternion.w
        ));
        const worldConn = new THREE.Vector3().copy(chassisBody.position).add(localConn);

        suspensionHelpers[i].position.copy(worldConn).lerp(
            wheelMeshes[i].position, 0.5
        );
        suspensionHelpers[i].lookAt(wheelMeshes[i].position);
        suspensionHelpers[i].rotateX(Math.PI / 2);
        const suspLen = worldConn.distanceTo(wheelMeshes[i].position);
        suspensionHelpers[i].scale.y = Math.max(suspLen, 0.01);
    }

    // ---- 相机跟随 ----
    const bodyPos = chassisBody.position;
    const bodyQuat = chassisBody.quaternion;

    // 理想相机位置：在车身后方
    const idealOffset = new THREE.Vector3(0, camTarget.height, -camTarget.distance);
    idealOffset.applyQuaternion(new THREE.Quaternion(
        bodyQuat.x, bodyQuat.y, bodyQuat.z, bodyQuat.w
    ));
    idealOffset.add(new THREE.Vector3(bodyPos.x, bodyPos.y, bodyPos.z));

    // 理想观察点：车身中心上方
    const idealLookAt = new THREE.Vector3(bodyPos.x, bodyPos.y + 1.5, bodyPos.z);

    // 平滑插值
    camTarget.currentPos.lerp(idealOffset, 0.08);
    camTarget.currentLookAt.lerp(idealLookAt, 0.08);

    camera.position.copy(camTarget.currentPos);
    camera.lookAt(camTarget.currentLookAt);

    // 视距调节
    if (keys.has('pageup')) {
        camTarget.distance = THREE.MathUtils.clamp(
            camTarget.distance - 5 * dt, camTarget.minDistance, camTarget.maxDistance
        );
    }
    if (keys.has('pagedown')) {
        camTarget.distance = THREE.MathUtils.clamp(
            camTarget.distance + 5 * dt, camTarget.minDistance, camTarget.maxDistance
        );
    }

    // ---- HUD 更新 ----
    // 速度 = 车身线速度的水平分量
    const vel = chassisBody.velocity;
    const speed = Math.sqrt(vel.x * vel.x + vel.z * vel.z);
    const displaySpeed = Math.round(speed * 3.6); // m/s -> km/h
    document.getElementById('speed').textContent = displaySpeed + ' km/h';

    // 物理信息
    const pos = chassisBody.position;
    document.getElementById('physics-info').textContent =
        `pos: ${pos.x.toFixed(1)}, ${pos.y.toFixed(1)}, ${pos.z.toFixed(1)} | phys_steps: ${physSteps}`;

    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
