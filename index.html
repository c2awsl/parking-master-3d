<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js + Cannon-es 倒车入库模拟器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; }
        canvas { display: block; }
        #hud {
            position: absolute; top: 16px; left: 16px;
            color: #fff; font-family: 'Consolas', monospace;
            font-size: 14px; line-height: 1.6;
            background: rgba(0,0,0,0.6); padding: 10px 14px;
            border-radius: 6px; pointer-events: none;
        }
        #speed {
            position: absolute; bottom: 16px; right: 16px;
            color: #0f0; font-family: 'Consolas', monospace;
            font-size: 20px; pointer-events: none;
            background: rgba(0,0,0,0.6); padding: 8px 16px;
            border-radius: 6px;
        }
        #physics-info {
            position: absolute; bottom: 60px; left: 16px;
            color: #ff0; font-family: 'Consolas', monospace;
            font-size: 12px; pointer-events: none;
            background: rgba(0,0,0,0.6); padding: 6px 10px;
            border-radius: 6px;
        }
        #steering-wrapper {
            position: absolute; bottom: 20px; left: 20px;
            width: 180px; height: 220px;
            pointer-events: none; user-select: none;
        }
        #steering-label {
            text-align: center; color: #aaa;
            font-family: 'Consolas', monospace;
            font-size: 11px; margin-bottom: 4px; pointer-events: none;
        }
        #steering-canvas {
            display: block; margin: 0 auto;
            cursor: grab; pointer-events: auto; border-radius: 50%;
        }
        #steering-canvas:active { cursor: grabbing; }
        #steering-angle {
            text-align: center; color: #0ff;
            font-family: 'Consolas', monospace;
            font-size: 12px; margin-top: 4px; pointer-events: none;
        }
        #gear-display {
            position: absolute; bottom: 16px; left: 50%;
            transform: translateX(-50%); pointer-events: none;
            display: flex; gap: 8px; align-items: center;
        }
        .gear-btn {
            width: 52px; height: 52px; border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.7); color: #888;
            font-family: 'Consolas', monospace;
            font-size: 22px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .gear-btn.active {
            border-color: #0f0; color: #0f0;
            background: rgba(0,255,0,0.15);
            box-shadow: 0 0 12px rgba(0,255,0,0.3);
        }
        .gear-btn.active-reverse {
            border-color: #f44; color: #f44;
            background: rgba(255,60,60,0.15);
            box-shadow: 0 0 12px rgba(255,60,60,0.3);
        }
        #gear-hint {
            color: #666; font-family: 'Consolas', monospace;
            font-size: 10px; text-align: center; margin-top: 2px;
            pointer-events: none;
        }
        #collision-flash {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; background: rgba(255,0,0,0);
            transition: background 0.05s; z-index: 10;
        }
        #collision-flash.active { background: rgba(255,0,0,0.15); }
        #collision-text {
            position: absolute; top: 80px; left: 50%;
            transform: translateX(-50%); color: #ff4444;
            font-family: 'Consolas', monospace;
            font-size: 18px; font-weight: bold;
            text-shadow: 0 0 8px rgba(255,0,0,0.5);
            pointer-events: none; opacity: 0; transition: opacity 0.2s;
        }
        #collision-text.visible { opacity: 1; }
        #parking-status {
            position: absolute; top: 16px; right: 16px;
            pointer-events: none; font-family: 'Consolas', monospace;
            font-size: 13px; background: rgba(0,0,0,0.6);
            padding: 10px 14px; border-radius: 6px; line-height: 1.8;
        }
        #parking-status .label { color: #aaa; }
        #parking-status .value { color: #fff; font-weight: bold; }
        #parking-status .ok { color: #0f0; }
        #parking-status .ng { color: #f44; }
        #success-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; z-index: 20;
            opacity: 0; transition: opacity 0.5s;
        }
        #success-overlay.visible { opacity: 1; }
        #success-box {
            background: rgba(0,100,0,0.9); border: 3px solid #0f0;
            border-radius: 16px; padding: 30px 60px; text-align: center;
            box-shadow: 0 0 40px rgba(0,255,0,0.3);
        }
        #success-box h1 {
            color: #0f0; font-family: 'Consolas', monospace;
            font-size: 36px; margin-bottom: 10px;
        }
        #success-box p {
            color: #aaffaa; font-family: 'Consolas', monospace; font-size: 16px;
        }
    </style>
</head>
<body>
<div id="hud">
    &#x1F697; 倒车入库模拟器<br>
    W/S - 油门/刹车 &nbsp; 空格 - 手刹<br>
    D键 - 前进档 &nbsp; R键 - 倒车档/重置<br>
    A/D - 转向 &nbsp; PageUp/Down - 视距
</div>
<div id="speed">0 km/h</div>
<div id="physics-info">加载中...</div>
<div id="gear-display">
    <div class="gear-btn" id="gear-R">R</div>
    <div class="gear-btn active" id="gear-D">D</div>
</div>
<div id="gear-hint">D - 前进档 | R - 倒车档</div>
<div id="collision-flash"></div>
<div id="collision-text">&#x26A0; 碰撞！</div>
<div id="parking-status">
    <div><span class="label">车位：</span><span class="value">A区-03</span></div>
    <div><span class="label">水平偏差：</span><span class="value" id="ps-posX">--</span></div>
    <div><span class="label">纵向偏差：</span><span class="value" id="ps-posZ">--</span></div>
    <div><span class="label">角度偏差：</span><span class="value" id="ps-angle">--</span></div>
    <div><span class="label">车位内：</span><span class="value" id="ps-inSpot">--</span></div>
    <div><span class="label">车身正：</span><span class="value" id="ps-aligned">--</span></div>
    <div><span class="label">状态：</span><span class="value" id="ps-result">--</span></div>
</div>
<div id="success-overlay">
    <div id="success-box">
        <h1>&#x2705; 入库成功！</h1>
        <p>按 R 重置车辆再来一次</p>
    </div>
</div>
<div id="steering-wrapper">
    <div id="steering-label">STEERING</div>
    <canvas id="steering-canvas" width="180" height="180"></canvas>
    <div id="steering-angle">0.0 deg</div>
</div>
<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/",
        "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
    }
}
</script>
<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';
// =============================================
// 一、Three.js 场景、相机、渲染器
// =============================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 80, 200);
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 8, 15);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// =============================================
// 二、灯光系统
// =============================================
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(20, 30, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5; dirLight.shadow.camera.far = 100;
dirLight.shadow.camera.left = -40; dirLight.shadow.camera.right = 40;
dirLight.shadow.camera.top = 40; dirLight.shadow.camera.bottom = -40;
scene.add(dirLight);
scene.add(new THREE.HemisphereLight(0x87CEEB, 0x362A28, 0.4));

// =============================================
// 三、Cannon-es 物理世界
// =============================================
const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0), allowSleep: true });
world.defaultContactMaterial = new CANNON.ContactMaterial(
    new CANNON.Material('default'), new CANNON.Material('default'),
    { friction: 0.3, restitution: 0.2, contactEquationStiffness: 1e8, contactEquationRelaxation: 3 }
);
const groundMaterial = new CANNON.Material('ground');
const wheelMaterial = new CANNON.Material('wheel');
world.addContactMaterial(new CANNON.ContactMaterial(wheelMaterial, groundMaterial,
    { friction: 0.45, restitution: 0.0, contactEquationStiffness: 1e8, contactEquationRelaxation: 3 }
));

// =============================================
// 四、物理地面
// =============================================
const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane(), material: groundMaterial });
groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
world.addBody(groundBody);
const groundMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(200, 200),
    new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.9 })
);
groundMesh.rotation.x = -Math.PI / 2; groundMesh.receiveShadow = true;
scene.add(groundMesh);
const gridHelper = new THREE.GridHelper(200, 100, 0x888888, 0x666666);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// =============================================
// 五、停车场环境元素
// =============================================
function createParkingLines() {
    const g = new THREE.Group();
    const m = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
    for (let row = 0; row < 2; row++) {
        const zB = row === 0 ? -8 : 8, d = row === 0 ? -1 : 1;
        for (let i = 0; i < 10; i++) {
            const x = -20 + i * 4;
            const l = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.02, 3.5), m);
            l.position.set(x, 0.02, zB + d * 1.5); g.add(l);
            const r = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.02, 3.5), m);
            r.position.set(x + 3.5, 0.02, zB + d * 1.5); g.add(r);
            const b = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.02, 0.15), m);
            b.position.set(x + 1.75, 0.02, zB); g.add(b);
        }
    }
    scene.add(g);
}
createParkingLines();

function createBollards() {
    const m = new THREE.MeshStandardMaterial({ color: 0xCC0000, roughness: 0.6 });
    [[-25,-15],[-25,-11],[-25,11],[-25,15],[25,-15],[25,-11],[25,11],[25,15]].forEach(([x, z]) => {
        const mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.25, 1.2, 8), m);
        mesh.position.set(x, 0.6, z); mesh.castShadow = true; scene.add(mesh);
        const body = new CANNON.Body({ mass: 0, shape: new CANNON.Cylinder(0.2, 0.25, 1.2, 8), position: new CANNON.Vec3(x, 0.6, z) });
        world.addBody(body);
    });
}
createBollards();

function createBuildings() {
    [
        { x: -35, z: 0, w: 15, h: 12, d: 15, c: 0x8899AA },
        { x: 35, z: 0, w: 12, h: 8, d: 20, c: 0x998877 },
        { x: 0, z: -30, w: 60, h: 10, d: 8, c: 0x778899 },
        { x: 0, z: 30, w: 60, h: 14, d: 8, c: 0x889988 },
    ].forEach(({ x, z, w, h, d, c }) => {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color: c, roughness: 0.8 }));
        mesh.position.set(x, h / 2, z); mesh.castShadow = true; mesh.receiveShadow = true; scene.add(mesh);
        world.addBody(new CANNON.Body({ mass: 0, shape: new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)), position: new CANNON.Vec3(x, h/2, z) }));
    });
}
createBuildings();

// =============================================
// 六、目标车库（倒车入库）
// =============================================
const PS = {
    cx: 22, cz: 18,
    width: 3.5, depth: 5.5,
    targetAngle: 0,
    angleTolerance: 15,
    wallH: 1.5, wallT: 0.15,
};

function createParkingSpot() {
    const { cx, cz, width, depth, wallH, wallT } = PS;
    const hW = width / 2, hD = depth / 2;
    const lineMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x333333 });

    // 白色标线（三面，开口在 -Z）
    [{ x: cx - hW, z: cz, w: wallT, d: depth },
     { x: cx + hW, z: cz, w: wallT, d: depth },
     { x: cx, z: cz + hD, w: width + wallT * 2, d: wallT }
    ].forEach(({ x, z, w, d }) => {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, 0.02, d), lineMat);
        mesh.position.set(x, 0.02, z); scene.add(mesh);
    });

    // 车库地面
    const sg = new THREE.Mesh(new THREE.PlaneGeometry(width - 0.1, depth - 0.1),
        new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8 }));
    sg.rotation.x = -Math.PI / 2; sg.position.set(cx, 0.015, cz); scene.add(sg);

    // 三面碰撞墙壁
    const wallMat = new CANNON.Material('wall');
    world.addContactMaterial(new CANNON.ContactMaterial(wallMat, new CANNON.Material('chassis'),
        { friction: 0.3, restitution: 0.5, contactEquationStiffness: 1e8, contactEquationRelaxation: 3 }));

    const wallDefs = [
        { x: cx - hW - wallT / 2, z: cz, he: new CANNON.Vec3(wallT / 2, wallH / 2, depth / 2 + wallT) },
        { x: cx + hW + wallT / 2, z: cz, he: new CANNON.Vec3(wallT / 2, wallH / 2, depth / 2 + wallT) },
        { x: cx, z: cz + hD + wallT / 2, he: new CANNON.Vec3(width / 2 + wallT, wallH / 2, wallT / 2) },
    ];
    const walls = [];
    wallDefs.forEach(({ x, z, he }) => {
        const body = new CANNON.Body({ mass: 0, material: wallMat, shape: new CANNON.Box(he), position: new CANNON.Vec3(x, wallH / 2, z) });
        body.userData = { type: 'parking_wall' };
        world.addBody(body); walls.push(body);
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(he.x * 2, he.y * 2, he.z * 2),
            new THREE.MeshStandardMaterial({ color: 0x88aacc, transparent: true, opacity: 0.35 }));
        mesh.position.set(x, wallH / 2, z); mesh.castShadow = true; scene.add(mesh);
    });
    return walls;
}
const parkingWalls = createParkingSpot();

// =============================================
// 七、Cannon-es RaycastVehicle
// =============================================
const VC = {
    wheelRadius: 0.3, suspensionStiffness: 30, suspensionRestLength: 0.2,
    dampingRelaxation: 2.3, dampingCompression: 4.4, maxSuspensionForce: 100000,
    maxSuspensionTravel: 0.2, rollInfluence: 0.01, maxSteerAngle: 0.6,
    engineForce: 600, brakeForce: 50,
};
const chassisBody = new CANNON.Body({
    mass: 150, shape: new CANNON.Box(new CANNON.Vec3(1, 0.35, 2)),
    position: new CANNON.Vec3(PS.cx, VC.wheelRadius + VC.suspensionRestLength + 0.35, 6),
});
world.addBody(chassisBody);

const vehicle = new CANNON.RaycastVehicle({ chassisBody, indexRightAxis: 0, indexUpAxis: 1, indexForwardAxis: 2 });
const wOpts = {
    radius: VC.wheelRadius, directionLocal: new CANNON.Vec3(0, -1, 0),
    suspensionStiffness: VC.suspensionStiffness, suspensionRestLength: VC.suspensionRestLength,
    maxSuspensionTravel: VC.maxSuspensionTravel, dampingRelaxation: VC.dampingRelaxation,
    dampingCompression: VC.dampingCompression, maxSuspensionForce: VC.maxSuspensionForce,
    rollInfluence: VC.rollInfluence, axleLocal: new CANNON.Vec3(-1, 0, 0),
    chassisConnectionPointLocal: new CANNON.Vec3(0, 0, 0),
    customSlidingRotationalSpeed: -30, useCustomSlidingRotationalSpeed: true,
};
const wPos = [
    new CANNON.Vec3(-1, 0, 1.4), new CANNON.Vec3(1, 0, 1.4),
    new CANNON.Vec3(-1, 0, -1.4), new CANNON.Vec3(1, 0, -1.4),
];
const steerIdx = [0, 1], driveIdx = [2, 3];
wPos.forEach(p => vehicle.addWheel({ ...wOpts, chassisConnectionPointLocal: p }));
vehicle.addToWorld(world);

// =============================================
// 八、Three.js 汽车视觉模型
// =============================================
const carGroup = new THREE.Group();
const bodyMesh = new THREE.Mesh(new THREE.BoxGeometry(2, 0.7, 4),
    new THREE.MeshStandardMaterial({ color: 0x1a5276, roughness: 0.3, metalness: 0.6 }));
bodyMesh.castShadow = true; carGroup.add(bodyMesh);
const cabinMesh = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 2.2),
    new THREE.MeshStandardMaterial({ color: 0x2980b9, roughness: 0.2, metalness: 0.7 }));
cabinMesh.position.set(0, 0.65, -0.3); cabinMesh.castShadow = true; carGroup.add(cabinMesh);

const glassMat = new THREE.MeshStandardMaterial({ color: 0xaaddff, transparent: true, opacity: 0.5, roughness: 0.1, metalness: 0.8 });
const wg = new THREE.BoxGeometry(1.6, 0.5, 0.05);
const fg = new THREE.Mesh(wg, glassMat); fg.position.set(0, 0.7, 0.75); fg.rotation.x = 0.3; carGroup.add(fg);
const rg = new THREE.Mesh(wg, glassMat); rg.position.set(0, 0.7, -1.4); rg.rotation.x = -0.3; carGroup.add(rg);

const hMat = new THREE.MeshStandardMaterial({ color: 0xffffaa, emissive: 0xffff00, emissiveIntensity: 0.5 });
const tMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.3 });
[-0.7, 0.7].forEach(x => {
    const hl = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), hMat); hl.position.set(x, 0.1, 2.01); carGroup.add(hl);
    const tl = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), tMat); tl.position.set(x, 0.1, -2.01); carGroup.add(tl);
});
scene.add(carGroup);

const wheelMeshes = [];
const tM = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8, metalness: 0.3 });
const hM = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.3, metalness: 0.8 });
for (let i = 0; i < 4; i++) {
    const wg2 = new THREE.Group();
    const tire = new THREE.Mesh(new THREE.CylinderGeometry(VC.wheelRadius, VC.wheelRadius, 0.25, 16), tM);
    tire.rotation.z = Math.PI / 2; tire.castShadow = true; wg2.add(tire);
    const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.26, 6), hM);
    hub.rotation.z = Math.PI / 2; wg2.add(hub);
    scene.add(wg2); wheelMeshes.push(wg2);
}

// =============================================
// 九、档位系统
// =============================================
let currentGear = 'D';
const gearDElem = document.getElementById('gear-D');
const gearRElem = document.getElementById('gear-R');
function updateGearUI() {
    gearDElem.className = currentGear === 'D' ? 'gear-btn active' : 'gear-btn';
    gearRElem.className = currentGear === 'R' ? 'gear-btn active-reverse' : 'gear-btn';
}

// =============================================
// 十、键盘输入
// =============================================
const keys = new Set();
let isBraking = false, shouldReset = false;

window.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    keys.add(key);
    if (e.key === ' ') { isBraking = true; e.preventDefault(); }
    if (key === 'd' && !e.repeat) { currentGear = 'D'; updateGearUI(); }
    if (key === 'r' && !e.repeat) {
        const v = chassisBody.velocity;
        if (Math.sqrt(v.x * v.x + v.z * v.z) < 0.5) {
            shouldReset = true;
        } else {
            currentGear = 'R'; updateGearUI();
        }
    }
});
window.addEventListener('keyup', (e) => {
    keys.delete(e.key.toLowerCase());
    if (e.key === ' ') isBraking = false;
});

// =============================================
// 十一、方向盘 UI
// =============================================
class SteeringWheel {
    constructor() {
        this.canvas = document.getElementById('steering-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.angleDisplay = document.getElementById('steering-angle');
        this.size = this.canvas.width;
        this.cx = this.size / 2; this.cy = this.size / 2;
        this.outerR = this.size / 2 - 8;
        this.innerR = this.outerR * 0.55;
        this.gripWidth = 14;
        this.currentAngle = 0; this.maxAngle = 270;
        this.isDragging = false; this.dragStartAngle = 0; this.dragStartRotation = 0;
        this.springEnabled = false; this.springVelocity = 0;
        this._bind();
    }
    _bind() {
        const c = this.canvas;
        c.addEventListener('mousedown', e => this._down(e));
        window.addEventListener('mousemove', e => this._move(e));
        window.addEventListener('mouseup', () => this._up());
        c.addEventListener('touchstart', e => { e.preventDefault(); this._down(e.touches[0]); }, { passive: false });
        window.addEventListener('touchmove', e => { if (this.isDragging) this._move(e.touches[0]); }, { passive: false });
        window.addEventListener('touchend', () => this._up());
    }
    _ang(e) {
        const r = this.canvas.getBoundingClientRect();
        return Math.atan2(e.clientY - r.top - this.cy, e.clientX - r.left - this.cx) * 180 / Math.PI;
    }
    _down(e) {
        const r = this.canvas.getBoundingClientRect();
        const dx = e.clientX - r.left - this.cx, dy = e.clientY - r.top - this.cy;
        if (Math.sqrt(dx*dx + dy*dy) > this.outerR + 20) return;
        this.isDragging = true; this.springEnabled = false; this.springVelocity = 0;
        this.dragStartAngle = this._ang(e); this.dragStartRotation = this.currentAngle;
    }
    _move(e) {
        if (!this.isDragging) return;
        let d = this._ang(e) - this.dragStartAngle;
        if (d > 180) d -= 360; if (d < -180) d += 360;
        this.currentAngle = THREE.MathUtils.clamp(this.dragStartRotation + d, -this.maxAngle, this.maxAngle);
    }
    _up() { if (this.isDragging) { this.isDragging = false; this.springEnabled = true; } }
    update(dt) {
        if (this.springEnabled && !this.isDragging) {
            const f = -12 * this.currentAngle - 6 * this.springVelocity;
            this.springVelocity += f * dt; this.currentAngle += this.springVelocity * dt;
            if (Math.abs(this.currentAngle) < 0.3 && Math.abs(this.springVelocity) < 1) {
                this.currentAngle = 0; this.springVelocity = 0; this.springEnabled = false;
            }
        }
        this.angleDisplay.textContent = this.currentAngle.toFixed(1) + ' deg';
    }
    getSteer() { return this.currentAngle / this.maxAngle; }
    draw() {
        const { ctx, cx: cx, cy: cy, outerR: R, innerR: iR, gripWidth: gw } = this;
        ctx.clearRect(0, 0, this.size, this.size);
        ctx.save(); ctx.translate(cx, cy);
        const arcS = Math.PI * 0.75, arcE = Math.PI * 2.25;
        ctx.beginPath(); ctx.arc(0, 0, R + 3, arcS, arcE);
        ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 6; ctx.stroke();
        const n = this.currentAngle / this.maxAngle, mid = (arcS + arcE) / 2;
        if (Math.abs(this.currentAngle) > 0.5) {
            ctx.beginPath(); ctx.arc(0, 0, R + 3, n < 0 ? mid + n * (arcE - arcS) / 2 : mid, n < 0 ? mid : mid + n * (arcE - arcS) / 2);
            ctx.strokeStyle = n < 0 ? '#ff6644' : '#44ff66'; ctx.lineWidth = 6; ctx.stroke();
        }
        for (let deg = -this.maxAngle; deg <= this.maxAngle; deg += 30) {
            const rad = (deg - 90) * Math.PI / 180, maj = deg % 90 === 0, len = maj ? 10 : 5;
            ctx.beginPath(); ctx.moveTo(Math.cos(rad) * (R - len), Math.sin(rad) * (R - len));
            ctx.lineTo(Math.cos(rad) * R, Math.sin(rad) * R);
            ctx.strokeStyle = maj ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.3)';
            ctx.lineWidth = maj ? 2 : 1; ctx.stroke();
        }
        ctx.save(); ctx.rotate(this.currentAngle * Math.PI / 180);
        ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2); ctx.strokeStyle = '#555'; ctx.lineWidth = gw; ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2); ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = gw - 4; ctx.stroke();
        ctx.lineWidth = 8; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(0, -R + gw / 2); ctx.lineTo(0, -iR); ctx.strokeStyle = '#666'; ctx.stroke();
        const bl = 240 * Math.PI / 180;
        ctx.beginPath(); ctx.moveTo(Math.cos(bl) * (R - gw / 2), Math.sin(bl) * (R - gw / 2));
        ctx.lineTo(Math.cos(bl) * iR, Math.sin(bl) * iR); ctx.strokeStyle = '#666'; ctx.stroke();
        const br = 300 * Math.PI / 180;
        ctx.beginPath(); ctx.moveTo(Math.cos(br) * (R - gw / 2), Math.sin(br) * (R - gw / 2));
        ctx.lineTo(Math.cos(br) * iR, Math.sin(br) * iR); ctx.strokeStyle = '#666'; ctx.stroke();
        const hg = ctx.createRadialGradient(0, 0, 0, 0, 0, iR * 0.6);
        hg.addColorStop(0, '#888'); hg.addColorStop(1, '#444');
        ctx.beginPath(); ctx.arc(0, 0, iR * 0.55, 0, Math.PI * 2); ctx.fillStyle = hg; ctx.fill();
        ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fillStyle = '#aaa'; ctx.fill();
        ctx.beginPath(); ctx.moveTo(0, -R + gw + 4); ctx.lineTo(-6, -R + gw + 16); ctx.lineTo(6, -R + gw + 16);
        ctx.closePath(); ctx.fillStyle = '#ff3333'; ctx.fill();
        ctx.restore(); ctx.restore();
    }
}
const steeringWheel = new SteeringWheel();

// =============================================
// 十二、碰撞检测 + 碰撞反馈
// =============================================
let collisionTimer = 0;
const collisionFlash = document.getElementById('collision-flash');
const collisionText = document.getElementById('collision-text');

// 注册碰撞事件：检测车身与车库墙壁的碰撞
chassisBody.addEventListener('collide', (e) => {
    const other = e.body;
    // 如果碰撞对象是车库墙壁
    if (other.userData && other.userData.type === 'parking_wall') {
        collisionTimer = 1.5;
    }
});

// =============================================
// 十三、入库判定逻辑
// =============================================
let parkingSuccess = false;
let successTimer = 0;

const psPosX = document.getElementById('ps-posX');
const psPosZ = document.getElementById('ps-posZ');
const psAngle = document.getElementById('ps-angle');
const psInSpot = document.getElementById('ps-inSpot');
const psAligned = document.getElementById('ps-aligned');
const psResult = document.getElementById('ps-result');
const successOverlay = document.getElementById('success-overlay');

/**
 * 入库判定条件：
 * 1. 车身中心 X 坐标在车位左右边线内（容差0.3m）
 * 2. 车身中心 Z 坐标在车位前后边线内（容差0.3m）
 * 3. 车身朝向与目标角度差 < 15 度
 *
 * 注意：这里比较的是车身 Y 轴旋转（yaw），即水平面上的朝向。
 * 目标角度为 0（车头朝 +Z，与车位方向一致）。
 */
function checkParking() {
    if (parkingSuccess) return;

    const px = chassisBody.position.x;
    const pz = chassisBody.position.z;
    const halfW = PS.width / 2;
    const halfD = PS.depth / 2;
    const margin = 0.3;

    // 条件1：X 方向在车位内
    const inX = px > (PS.cx - halfW + margin) && px < (PS.cx + halfW - margin);
    // 条件2：Z 方向在车位内
    const inZ = pz > (PS.cz - halfD + margin) && pz < (PS.cz + halfD - margin);
    const inSpot = inX && inZ;

    // 条件3：角度偏差
    // 提取 Y 轴旋转角度（偏航角）
    const euler = new THREE.Euler().setFromQuaternion(
        new THREE.Quaternion(chassisBody.quaternion.x, chassisBody.quaternion.y, chassisBody.quaternion.z, chassisBody.quaternion.w),
        'YXZ'
    );
    let yawDeg = THREE.MathUtils.radToDeg(euler.y);
    // 归一化到 [-180, 180]
    while (yawDeg > 180) yawDeg -= 360;
    while (yawDeg < -180) yawDeg += 360;
    const angleDiff = Math.abs(yawDeg);
    const aligned = angleDiff < PS.angleTolerance;

    // 更新状态面板
    psPosX.textContent = (px - PS.cx).toFixed(2) + 'm';
    psPosX.className = inX ? 'value ok' : 'value ng';
    psPosZ.textContent = (pz - PS.cz).toFixed(2) + 'm';
    psPosZ.className = inZ ? 'value ok' : 'value ng';
    psAngle.textContent = yawDeg.toFixed(1) + ' deg';
    psAngle.className = aligned ? 'value ok' : 'value ng';
    psInSpot.textContent = inSpot ? '是' : '否';
    psInSpot.className = inSpot ? 'value ok' : 'value ng';
    psAligned.textContent = aligned ? '是' : '否';
    psAligned.className = aligned ? 'value ok' : 'value ng';

    if (inSpot && aligned) {
        psResult.textContent = '✓ 入库成功！';
        psResult.className = 'value ok';
        parkingSuccess = true;
        successTimer = 5;
        successOverlay.classList.add('visible');
    } else if (inSpot) {
        psResult.textContent = '调整角度...';
        psResult.className = 'value ng';
    } else {
        psResult.textContent = '驶入车位';
        psResult.className = 'value ng';
    }
}

// =============================================
// 十四、第三人称相机
// =============================================
const camTarget = {
    distance: 12, minDistance: 5, maxDistance: 25, height: 5,
    currentPos: new THREE.Vector3(PS.cx, 8, PS.cz - 20),
    currentLookAt: new THREE.Vector3(PS.cx, 1, PS.cz),
};

// =============================================
// 十五、窗口自适应
// =============================================
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// =============================================
// 十六、悬挂调试辅助线
// =============================================
const suspHelpers = [];
for (let i = 0; i < 4; i++) {
    const h = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 1, 4), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
    scene.add(h); suspHelpers.push(h);
}

// =============================================
// 十七、游戏主循环
// =============================================
const clock = new THREE.Clock();

function resetVehicle() {
    chassisBody.position.set(PS.cx, VC.wheelRadius + VC.suspensionRestLength + 0.35, 6);
    chassisBody.quaternion.set(0, 0, 0, 1);
    chassisBody.velocity.set(0, 0, 0);
    chassisBody.angularVelocity.set(0, 0, 0);
    for (let i = 0; i < 4; i++) {
        vehicle.setBrake(0, i);
        vehicle.applyEngineForce(0, i);
        vehicle.setSteeringValue(0, i);
    }
    currentGear = 'D'; updateGearUI();
    parkingSuccess = false;
    successOverlay.classList.remove('visible');
    psResult.textContent = '--'; psResult.className = 'value';
}

function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);

    // 重置车辆
    if (shouldReset) { shouldReset = false; resetVehicle(); }

    // 更新方向盘
    steeringWheel.update(dt);
    steeringWheel.draw();

    // ---- 转向输入 ----
    let steerInput = steeringWheel.getSteer();
    if (keys.has('a')) steerInput = 1;
    if (keys.has('d') && !keys.has('r')) steerInput = -1;
    // 注意：D键既用于转向也用于切换档位，转向只在按住时生效
    // 用单独的 left/right 方向键或直接用方向盘更合理，这里保留 A/D 转向兼容
    const steerValue = steerInput * VC.maxSteerAngle;

    // ---- 引擎力（受档位影响）----
    let engineForce = 0;
    if (keys.has('w')) {
        // D 档：W = 前进正力; R 档：W = 倒车（反向力）
        engineForce = currentGear === 'D' ? VC.engineForce : -VC.engineForce * 0.5;
    }
    if (keys.has('s')) {
        // D 档：S = 倒车/刹车; R 档：S = 前进
        engineForce = currentGear === 'D' ? -VC.engineForce * 0.5 : VC.engineForce;
    }

    // 应用力
    driveIdx.forEach(i => vehicle.applyEngineForce(engineForce, i));
    steerIdx.forEach(i => vehicle.setSteeringValue(steerValue, i));

    // 手刹
    for (let i = 0; i < 4; i++) vehicle.setBrake(isBraking ? VC.brakeForce : 0, i);

    // 物理步进
    world.step(1 / 60, dt, 3);

    // 同步视觉模型
    carGroup.position.copy(chassisBody.position);
    carGroup.quaternion.copy(chassisBody.quaternion);

    for (let i = 0; i < 4; i++) {
        const t = vehicle.wheelInfos[i].worldTransform;
        wheelMeshes[i].position.set(t.position.x, t.position.y, t.position.z);
        wheelMeshes[i].quaternion.set(t.quaternion.x, t.quaternion.y, t.quaternion.z, t.quaternion.w);
        // 悬挂辅助线
        const info = vehicle.wheelInfos[i];
        const lc = new THREE.Vector3().copy(info.chassisConnectionPointLocal);
        lc.applyQuaternion(new THREE.Quaternion(chassisBody.quaternion.x, chassisBody.quaternion.y, chassisBody.quaternion.z, chassisBody.quaternion.w));
        const wc = new THREE.Vector3().copy(chassisBody.position).add(lc);
        suspHelpers[i].position.copy(wc).lerp(wheelMeshes[i].position, 0.5);
        suspHelpers[i].lookAt(wheelMeshes[i].position);
        suspHelpers[i].rotateX(Math.PI / 2);
        suspHelpers[i].scale.y = Math.max(wc.distanceTo(wheelMeshes[i].position), 0.01);
    }

    // 碰撞反馈衰减
    if (collisionTimer > 0) {
        collisionTimer -= dt;
        collisionFlash.classList.add('active');
        collisionText.classList.add('visible');
        if (collisionTimer <= 0) {
            collisionFlash.classList.remove('active');
            collisionText.classList.remove('visible');
        }
    }

    // 入库判定
    checkParking();

    // 成功倒计时
    if (successTimer > 0) {
        successTimer -= dt;
        if (successTimer <= 0) successOverlay.classList.remove('visible');
    }

    // 相机跟随
    const bP = chassisBody.position, bQ = chassisBody.quaternion;
    const iOff = new THREE.Vector3(0, camTarget.height, -camTarget.distance);
    iOff.applyQuaternion(new THREE.Quaternion(bQ.x, bQ.y, bQ.z, bQ.w));
    iOff.add(new THREE.Vector3(bP.x, bP.y, bP.z));
    const iLA = new THREE.Vector3(bP.x, bP.y + 1.5, bP.z);
    camTarget.currentPos.lerp(iOff, 0.08);
    camTarget.currentLookAt.lerp(iLA, 0.08);
    camera.position.copy(camTarget.currentPos);
    camera.lookAt(camTarget.currentLookAt);

    if (keys.has('pageup')) camTarget.distance = THREE.MathUtils.clamp(camTarget.distance - 5 * dt, camTarget.minDistance, camTarget.maxDistance);
    if (keys.has('pagedown')) camTarget.distance = THREE.MathUtils.clamp(camTarget.distance + 5 * dt, camTarget.minDistance, camTarget.maxDistance);

    // HUD
    const v = chassisBody.velocity;
    document.getElementById('speed').textContent = Math.round(Math.sqrt(v.x*v.x + v.z*v.z) * 3.6) + ' km/h';
    const p = chassisBody.position;
    document.getElementById('physics-info').textContent = `pos: ${p.x.toFixed(1)}, ${p.z.toFixed(1)} | gear: ${currentGear}`;

    renderer.render(scene, camera);
}
animate();
</script>
