<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>科目二模拟驾驶</title>
<link rel="stylesheet" href="css/style.css">
<script type="importmap">
{ "imports": {
    "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
    "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
}}
</script>
</head>
<body>

<div id="cflash"></div>

<div id="hud">
  <div class="hud-card">
    <div class="label">速度</div>
    <div><span id="speed-value" class="value">0</span><span class="unit"> km/h</span></div>
  </div>
  <div class="hud-card">
    <div class="label">档位</div>
    <div><span id="gear-text" class="gear gear-d">D</span></div>
  </div>
</div>

<div id="status"></div>

<div id="tabs"></div>
<div id="sub-tabs"></div>

<div id="controls">
  <button class="ctrl-btn" id="btn-reset" title="重置 (R)">↺</button>
  <button class="ctrl-btn" id="btn-cam" title="切换视角 (C)">◉</button>
</div>

<div id="sw-wrap">
  <canvas id="sw-canvas" width="120" height="120"></canvas>
</div>

<script type="module" src="js/game.js"></script>

<script>
document.getElementById('btn-reset').addEventListener('click', () => {
  window.dispatchEvent(new KeyboardEvent('keydown', { code: 'KeyR' }));
  setTimeout(() => window.dispatchEvent(new KeyboardEvent('keyup', { code: 'KeyR' })), 50);
});
document.getElementById('btn-cam').addEventListener('click', () => {
  window.dispatchEvent(new KeyboardEvent('keydown', { code: 'KeyC' }));
  setTimeout(() => window.dispatchEvent(new KeyboardEvent('keyup', { code: 'KeyC' })), 50);
});
</script>

</body>
</html>
